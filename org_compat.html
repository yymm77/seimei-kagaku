<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>組織と人の相性判定｜姓名科学</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1208;--paper:#f5f0e8;--gold:#b8960c;--vermillion:#c0392b;
  --indigo:#1a3a5c;--jade:#2d6a4f;--mist:#7a6c56;--accent:#e8dfc8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:'Noto Serif JP',serif;min-height:100vh;padding-bottom:60px}

/* ヘッダー */
.page-header{background:linear-gradient(135deg,var(--ink) 0%,#2a1c0c 60%,var(--indigo) 100%);color:var(--paper);padding:32px 24px 28px;text-align:center;position:relative;overflow:hidden}
.page-header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='1' fill='rgba(184,150,12,.08)'/%3E%3C/svg%3E") repeat}
.page-title{font-family:'Zen Old Mincho',serif;font-size:22px;letter-spacing:.6em;color:var(--gold);position:relative}
.page-sub{font-size:11px;letter-spacing:.4em;color:rgba(245,240,232,.5);margin-top:6px;position:relative}
.nav-back{position:absolute;top:50%;left:20px;transform:translateY(-50%);font-size:11px;color:rgba(245,240,232,.5);text-decoration:none;letter-spacing:.3em;border:1px solid rgba(245,240,232,.2);padding:4px 12px;transition:all .2s}
.nav-back:hover{color:var(--gold);border-color:var(--gold)}

/* レイアウト */
.container{max-width:860px;margin:0 auto;padding:0 16px}
.sec{font-size:10px;letter-spacing:.6em;color:var(--gold);padding:8px 0;margin:28px 0 12px;border-bottom:1px solid rgba(184,150,12,.25)}

/* 入力パネル */
.input-panel{background:white;border:1px solid rgba(184,150,12,.2);border-radius:2px;padding:24px;margin-bottom:20px}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:580px){.input-row{grid-template-columns:1fr}}
.input-block{display:flex;flex-direction:column;gap:8px}
.input-label{font-size:11px;letter-spacing:.4em;color:var(--mist)}
.input-sublabel{font-size:10px;color:var(--mist);opacity:.7}
.name-input{border:1px solid rgba(184,150,12,.3);background:var(--paper);color:var(--ink);font-family:'Noto Serif JP',serif;font-size:20px;padding:10px 14px;letter-spacing:.2em;outline:none;transition:border-color .2s;width:100%}
.name-input:focus{border-color:var(--gold);background:white}
.legal-select{border:1px solid rgba(184,150,12,.3);background:var(--paper);color:var(--ink);font-family:'Noto Serif JP',serif;font-size:13px;padding:8px 12px;outline:none;width:100%}
.role-select{border:1px solid rgba(184,150,12,.3);background:var(--paper);color:var(--ink);font-family:'Noto Serif JP',serif;font-size:13px;padding:8px 12px;outline:none;width:100%}
.stroke-preview{font-size:11px;color:var(--mist);min-height:18px;letter-spacing:.1em}
.unknown-warn{color:var(--vermillion);font-size:10px}

/* 解析ボタン */
.analyze-btn{display:block;width:100%;padding:14px;background:var(--ink);color:var(--gold);font-family:'Zen Old Mincho',serif;font-size:14px;letter-spacing:.8em;border:none;cursor:pointer;transition:all .3s;margin-top:20px}
.analyze-btn:hover{background:#2a1c0c;letter-spacing:1em}

/* 結果エリア */
.results{display:none}
.results.visible{display:block}

/* スコアカード */
.score-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
@media(max-width:520px){.score-cards{grid-template-columns:1fr 1fr}}
.score-card{background:white;border:1px solid rgba(184,150,12,.2);border-radius:2px;padding:16px;text-align:center}
.score-card-label{font-size:9px;letter-spacing:.4em;color:var(--mist);margin-bottom:6px}
.score-card-val{font-family:'Zen Old Mincho',serif;font-size:28px;font-weight:700}
.score-card-val.hi{color:var(--jade)}
.score-card-val.mid{color:var(--indigo)}
.score-card-val.lo{color:var(--vermillion)}
.score-card-sub{font-size:10px;color:var(--mist);margin-top:4px}

/* 相性メーターバー */
.compat-meter{background:white;border:1px solid rgba(184,150,12,.2);padding:20px 24px;margin-bottom:20px}
.meter-label{font-size:11px;letter-spacing:.4em;color:var(--mist);margin-bottom:12px}
.meter-bar-wrap{height:16px;background:rgba(26,18,8,.06);border-radius:8px;overflow:hidden;margin-bottom:6px}
.meter-bar{height:100%;border-radius:8px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.meter-score{display:flex;justify-content:space-between;font-size:11px;color:var(--mist)}
.meter-grade{font-family:'Zen Old Mincho',serif;font-size:20px;font-weight:700;text-align:center;margin-top:10px}

/* 判定テキスト */
.judge-block{background:rgba(26,18,8,.03);border-left:3px solid var(--gold);padding:16px 20px;margin-bottom:16px;line-height:1.9;font-size:13px}
.judge-block.hi{border-left-color:var(--jade)}
.judge-block.mid{border-left-color:var(--indigo)}
.judge-block.lo{border-left-color:var(--vermillion)}
.judge-title{font-size:11px;letter-spacing:.4em;margin-bottom:8px}
.judge-title.hi{color:var(--jade)}
.judge-title.mid{color:var(--indigo)}
.judge-title.lo{color:var(--vermillion)}

/* ポイント比較表 */
.compare-table{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:12px}
.compare-table th{font-size:10px;letter-spacing:.3em;color:var(--mist);padding:6px 12px;border-bottom:1px solid rgba(184,150,12,.2);font-weight:400;text-align:center}
.compare-table td{padding:8px 12px;border-bottom:1px solid rgba(184,150,12,.1);text-align:center;vertical-align:middle}
.compare-table .col-label{text-align:left;font-size:11px;letter-spacing:.2em;color:var(--mist)}
.compare-table .col-person{font-weight:700;font-family:'Zen Old Mincho',serif}
.compare-table .col-org{font-weight:700;font-family:'Zen Old Mincho',serif}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px}
.badge.k{background:rgba(45,106,79,.15);color:var(--jade);border:1px solid rgba(45,106,79,.3)}
.badge.c{background:rgba(26,58,92,.12);color:var(--indigo);border:1px solid rgba(26,58,92,.25)}
.badge.x{background:rgba(192,57,43,.12);color:var(--vermillion);border:1px solid rgba(192,57,43,.25)}

/* 相性アドバイス */
.advice-sections{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.advice-item{background:white;border:1px solid rgba(184,150,12,.15);border-radius:2px;overflow:hidden}
.advice-item-head{padding:10px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:rgba(184,150,12,.04);transition:background .2s}
.advice-item-head:hover{background:rgba(184,150,12,.08)}
.advice-item-title{font-size:12px;font-weight:700;letter-spacing:.3em}
.advice-item-badge{font-size:10px;padding:2px 10px;border-radius:10px}
.advice-item-body{padding:14px 16px;font-size:12px;line-height:1.9;display:none;border-top:1px solid rgba(184,150,12,.1)}
.advice-item-body.open{display:block}
.advice-arrow{font-size:12px;color:var(--mist);transition:transform .2s}
.advice-arrow.open{transform:rotate(90deg)}
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="nav-back">← 戻る</a>
  <div class="page-title">組織と人の相性判定</div>
  <div class="page-sub">経営者・従業員と組織の数理的相性を分析します</div>
</div>

<div class="container">

  <div class="sec">入　力</div>

  <!-- 人物入力 -->
  <div class="input-panel">
    <div style="font-size:11px;letter-spacing:.4em;color:var(--gold);margin-bottom:16px">▸ 人物（経営者・従業員）</div>
    <div class="input-row">
      <div class="input-block">
        <label class="input-label">姓（苗字）</label>
        <input class="name-input" id="person-sei" maxlength="8" placeholder="例：三原" oninput="onPersonInput()">
        <div class="stroke-preview" id="p-sei-strokes"></div>
      </div>
      <div class="input-block">
        <label class="input-label">名（名前）</label>
        <input class="name-input" id="person-mei" maxlength="8" placeholder="例：嘉明" oninput="onPersonInput()">
        <div class="stroke-preview" id="p-mei-strokes"></div>
      </div>
    </div>
    <div style="margin-top:14px">
      <label class="input-label" style="display:block;margin-bottom:6px">立場・役割</label>
      <select class="role-select" id="person-role">
        <option value="ceo">経営者・代表取締役</option>
        <option value="director">取締役・役員</option>
        <option value="manager">管理職（部長・課長）</option>
        <option value="staff" selected>一般従業員</option>
        <option value="partner">共同経営者・パートナー</option>
        <option value="candidate">入社候補者</option>
      </select>
    </div>
  </div>

  <!-- 組織入力 -->
  <div class="input-panel">
    <div style="font-size:11px;letter-spacing:.4em;color:var(--gold);margin-bottom:16px">▸ 組織（会社・団体）</div>
    <div class="input-row">
      <div class="input-block">
        <label class="input-label">社名本体（上段）</label>
        <span class="input-sublabel">法人格を除いた名称</span>
        <input class="name-input" id="org-sei" maxlength="20" placeholder="例：日昇リサーチ" oninput="onOrgInput()">
        <div class="stroke-preview" id="o-sei-strokes"></div>
      </div>
      <div class="input-block">
        <label class="input-label">法人格（下段）</label>
        <select class="legal-select" id="org-legal" onchange="onOrgInput()">
          <option value="">（なし）</option>
          <option value="株式会社" selected>株式会社</option>
          <option value="有限会社">有限会社</option>
          <option value="合同会社">合同会社</option>
          <option value="一般社団法人">一般社団法人</option>
          <option value="一般財団法人">一般財団法人</option>
          <option value="公益社団法人">公益社団法人</option>
          <option value="公益財団法人">公益財団法人</option>
          <option value="国立研究開発法人">国立研究開発法人</option>
        </select>
        <div class="stroke-preview" id="o-mei-strokes"></div>
      </div>
    </div>
  </div>

  <button class="analyze-btn" onclick="runOrgCompat()">✦　相　性　を　判　定　する　✦</button>

  <!-- 結果 -->
  <div class="results" id="results">

    <div class="sec">判　定　結　果</div>

    <!-- スコアカード3枚 -->
    <div class="score-cards" id="score-cards"></div>

    <!-- 相性メーター -->
    <div class="compat-meter" id="compat-meter"></div>

    <!-- 総合判定文 -->
    <div id="judge-text"></div>

    <!-- ポイント比較表 -->
    <div class="sec">12ポイント比較</div>
    <table class="compare-table" id="compare-table"></table>

    <!-- 観点別アドバイス -->
    <div class="sec">観点別アドバイス</div>
    <div class="advice-sections" id="advice-sections"></div>

  </div>
</div>

<script>
// =============================================

const SQ={"1":{"点数":44,"数意":"創意希望の運","解説":"新しいお正月を迎えるような、すがすがしい感じのする運です。心線は生活分野の安定度をみることに使われます。この一画には人生の切り札となる新しい活動の目標がどんどん希望的に生まれ、その夢がどんどん希望的にふくらんでいきます。場合でもこの一画がその生活分野に現われてあなたを救ってくれます。"},"2":{"点数":4,"数意":"岐路選択の運","解説":"周囲の事情が変わってくると、この二画をもっている人は、必ずその影響を受けることになります。そのために時の変化に対しては非常に敏感です。自分の希望に反したところへいけるだろうと善いところをねらうのですが、二兎追うものは一兎もえず、という諺があります。集中した希望を広げないで、上手な生き方とならぬよう注意しましょう。"},"3":{"点数":38,"数意":"結集組立の運","解説":"小まめな勤勉性をもった運で、その辺にとりとめもなく棄てある廃品を集めてきて、その使える部分をとりまとめ、見事な製品に仕上げる奇才があります。組み立ててしまう奇才があります。いる人には相談相手になり困っている人には手際を働かせ、みんなに好かれます。補佐数としてまとめていく才能を守備能力として、きわめて効率の良い処理力を発揮します。"},"4":{"点数":5,"数意":"重責鍛練の運","解説":"どうも損な役を引き受けさせられる意味があります。最初は希望さえ楽しい仕事だったのに、だんだん負担が重くなりだして、ついに投げだすことになるのではなく、徐々に悪化していきます。この運の特性は自分が周囲の縁の下の力として、きわめて効率の良い処理力を発揮します。マイペースで一歩一歩堅実に進みましょう。敬と感謝を集め人徳を残すことができます。"},"5":{"点数":39,"数意":"克服達成の運","解説":"非常にばか正直で向う意気の強い運です。何事にも意欲的ですから、人がひるむような難しいことでも正面から堂々と四つに取り組んで退却しません。まわりで見ていた人たちが「これは危ない」と調子を落とさず粘りもしてさがあります。克服してしまうというたくましさがあります。専門分野において起爆力のような突破力を発揮します。"},"6":{"点数":48,"数意":"天恵完成の運","解説":"この六画のある生活分野は、苦労は少ないのに貴いものが多い運といいます。ちょうど、お金持ちの坊ちゃんのように豊かな遺産に恵まれます。花を飾るという調子の良さがあります。特異な天才的なアイデアの持ち主が多く、複雑で難解な仕事も最後の二分を仕上げて基礎的に八分どうり完成に近い見事さです。性格の面では小さな事にこせこせしないところがあります。"},"7":{"点数":28,"数意":"一念堅持の運","解説":"競走馬のように、一つの目的が決まると、どんな障害があろうとやみくもに突っ走っていく運です。しかし反面、いったん走りだすと方向転換をする果をあげます。グアム島から生還した横井庄一さんがこの運で再起不能になるほどの深い傷をおって、やっと止まれ、それを承知で走り続けます。このように「偏屈だ」とか「意固地だ」という批判を受けながらも本人も発想の転換が不得手なので、ストレスがたまって悩みます。"},"8":{"点数":32,"数意":"鉄壁弧城の運","解説":"山登りにいく場合に、「重たいからテントは置いていったら」とすすめても、「いやどうしても持つ」といって徹底した完全主義者です。だからこそ登山帽には羽根がついてカッコいいのです。徹底した完全主義者でもあります。強く反対されることもあれば、必要なものならば一切欲張りません。その時に気や色、飾りや世話も面倒なのはほとんどありません。"},"9":{"点数":7,"数意":"瓦解防禦の運","解説":"多くの親族をかかえた本家の総領みたいな心配事が絶えない運です。あれこれと面倒をみるためのとにかく重たい責任をかかえてすることを面倒をみているのです。嫌だと思いながらも守り抜こうとする執着心が強い。例えば、親父から古いのれんの店を譲られます。そして「これを何としても守り抜こうと徹底します。」さは天下一品ですが、ついに倒産するまでがんばり粘り強さは天下一品ですが。"},"10":{"点数":13,"数意":"暗中模索の運","解説":"問題がいずれも何か煮詰まらずにいる時に、焦るところがあります。汽車がトンネルの中に入ると、早く光明輝やかになる新方向へ手探りし始めます。そこで希望と不安の入り交ってちょっとでも希望の兆しの先の光を発見すると、やみくもに手探りを始めます。気になる運ですから、ちょっとでも手探りを始めます。なかには根気の良い追求のすえ、一つの専門分野における フロンティアとしての地位を築く人もいます。"},"11":{"点数":40,"数意":"再生中興の運","解説":"物事がことごとく停滞し、いき詰った時に、確実な十一の運のある人が再建にのりだせば、何か確実なことができます。あなたの職場でも、この運の人が現われると新しい道を切り開くことができます。指導力によって新しいシステムの整理方法や活動方針が提案されて、心改まる状態が生まれるでしょう。一新した気分をもたらすでしょう。"},"12":{"点数":17,"数意":"変転流動の運","解説":"この流れや周囲の変化に先見性に優れます。そのために、時流に追われて流されているのか、全く判らなくなるほど、変動を激しく追いかけている運です。この生活体験から先見性に優れます。車から飛行機とタイムリーに乗り換えて進む、十二画の特性です。時流に乗って、十二画の特性です。盛運では時流に乗って、成金的な大成果を得る反面、逆流にもかんたんに吞み込まれて、大失敗を演ずる反面もあるでしょう。"},"13":{"点数":43,"数意":"才気活発の運","解説":"泉がわきでるように、よく話しよく書くという豊かな才能に恵まれた運です。豊かな才能に恵まれているだけでなく、時に応じて機を見るに敏な才気があります。記憶力も豊かで優れているだけでなく、あなたのグループにこの運の人がいると、時には人気を集めるでしょう。結構みんなの人気を集めるでしょう。この十三画の特性です。相手の立場をよく理解した人間関係に心掛けることが望まれます。"},"14":{"点数":14,"数意":"足踏修正の運","解説":"相撲とりが取り組みの段階で、何度もしきり直しをするような運です。いざ実行という時に突然の洪水に流されてしまい、目標から遠ざかってしまい、またもや最初からやり直しで積み重ねた苦労を一瞬にし直すということを繰り返す運です。芸術家や事務関係、技術開発の仕事に適しています。安定した進展期間が少ないので、外見は積極的ですが内面では自信と迫力に欠ける女性的な運です。"},"15":{"点数":50,"数意":"理想進展の運","解説":"ロマンチックな暖かい愛を秘めた人に多い運です。あなたの心と一つになって、共に喜び共に悲しんでくれる人がいれば、共に幸せを感じのです。この運の特性は「縁の下の力」的な協力者となることです。したがって、脇役としての価値を高く評価し、役割として一人で得られるならば協力して二人の人で実現できます。心楽しく彩ることができるでしょう、夢なしい現実を。"},"16":{"点数":46,"数意":"機略縦横の運","解説":"外見は柔軟で大ざっぱに見えます。しかし、内面は意外なほどデリケートで粘り強さも持って、内面では短期戦でのぞんできますが、長期戦での勝ちめがあります。最後に笑うのはこの運の人に、長期計画で堅実に着々と成果を築いていきます。参謀長的な存在に価値をもちます。このため組織内では、柔軟で時宜にかなった解決策をすすめます。"},"17":{"点数":23,"数意":"片面勝利の運","解説":"人がいま何を考えているかを敏感に見抜くところがあります。しかし自分の考えは決して曲げず、他のどんな反対も無視して強引に進める場合が多いのです。自分が決めた方針はどんな反対も無視して強行します。このような直進性から個人に偏って愛情や職業面で深い陰影が生まれます。誉や欲望を犠牲にしてでも仕事や家庭面に専念して地位や名声や財を失うこともあります。"},"18":{"点数":41,"数意":"敢闘猛進の運","解説":"この運の人は、外見は「きっぱり」と締って見えます。外見は大変強く頼りがあるように思われます。集力をもって、じっくりと、活動が盛んになり多くの期待が集まります。綿密な計画を好みますから、非常事態にのぞんで、タイミングを見て手を打ち、着実に石橋をたたいて安全策を用いて、重たい責任を集中させないような良いアドバイザーとして安定した大きな成果が期待できます。"},"19":{"点数":6,"数意":"混乱整理の運","解説":"問題が複雑になってくると人々が入り乱れて対立し、もみんなから前に仲裁者になろうとして、自分が仲裁をしたり自分の立場を堅く守っている間は、違って、どちらの肩を持つかとなると意外にもろく、自分自身が混乱の渦中に巻き込まれてしまいます。この意味での心がもっとも難しいところです。"},"20":{"点数":12,"数意":"悲願未熟の運","解説":"意欲的なところがあるのに、なかなか成果が上がらず、あてにしていた発展が思ったよりも少なく、常に悲願をいだき続ける伝食はもたない運です。短期目でみてはこれがいかに意欲的な失敗を招くか、今までの保護者や協力者の援助を集めますが、いったん好転していく時期には突然の好転を招いていくことになります。"},"21":{"点数":47,"数意":"率先指揮の運","解説":"みんなが弱腰になっているような強気な時に、この運の人がいると、だんだん強気になっていきます。決断と英知に優れており、なかなか説得も上手で、自然に強い信頼感が生まれ、この人の後につく自分が強く動かされます。先頭に立って指揮をふるうでしょう。強力な計画性と指導力をもっています。"},"22":{"点数":9,"数意":"唯我独尊の運","解説":"人間は本来自由だから、こうするべきだ一式の超他人の忠告を無視するきらいがあって、自分の信念を貫き通して社会的に独特な権威と評価を得る人もいます。しかし、それでも頑固だとか、頑迷だとかいう批判を受けて、孤立した存在となってしまうことも多いでしょう。なお、従順な後輩や部下をもっていれば、地位が保証されて好調です。"},"23":{"点数":50,"数意":"快速向上の運","解説":"非常に功名心が強いので、人の高い評価を得られるところがあります。どんな危険も省みないで全力を傾けます。気宇壮大な計画をもち、人々を動員し、末広がりの発展へ導いていくという頭領運です。大きな計画を着実に収めていくにも拘わらず、足元の堅実な成果も着実に収めています。"},"24":{"点数":37,"数意":"初志貫徹の運","解説":"目の前の短期的な目標でみてはこれがいかに意欲的なことがあります。長い目でみてこれは意欲的な挑戦をはじめます。素直さや心意気にあります。いざ実行となると、現実との接点を求めて柔軟で時宜にかなった解決策をすすめます。またよく人の相談にのりますが、周囲の人々を動かして計画力に着々と独特の完成にこぎつけることができます。"},"25":{"点数":31,"数意":"自立自営の運","解説":"表面は人なつっこくても、内面には鋭い洞察力を持っています。厳しく人を批判するとともに気軽に恋人気取りで、意外な批難を受けてびっくりすることがあるでしょう。しかし、どうも強い主張をもっています。この主張を強引に押し通そうとするあまりに、難しい自己表現のできる環境では次々に先手を打って自己表現をとるでしょう。短気を起こさずに、真意を徹底させることができれば、独自の魅力ある権威と特異な成果を残すことができるでしょう。"},"26":{"点数":10,"数意":"実地体験の運","解説":"自分の体験だけを強く信じるところがあって、他人の忠告を無視するきらいがあります。相手から反応があると親しい人が忠告しても、だまされているほどの信頼です。馬鹿正直というか意固地でやっと納得します。しかし、どうも意固地になりやすいとか意地でやっとと納得します。放浪者的な末路をたどりかねません。"},"27":{"点数":16,"数意":"仲介斡旋の運","解説":"依頼者の身代りになって物事を処理する運です。物事を処理するために結婚も誰かの犠牲になってみるとか、親代りに弟や妹たちの面倒をみるための結婚であったり本人が実際に代行者になるということが多いようです。職業面でも、委員、委員長として書く作家や評論家などの文士をはじめ、委託されて代行する弁護士、税理士、組織の代行的な経営者などの文章に似ています。"},"28":{"点数":8,"数意":"難題処理の運","解説":"周囲に難題が起これば、たちまち自分に引火して苦しい人生街道に転がすことになりますが、良い先輩や保護を背にして積極的な解決方向に進む、精神的には自分で孤独な解決を背に持って進んでいきます。しかし、良い人柄のためには社会的にも価値のある実力者となって、大きな苦悩をする運です。たくさんの偉業を残すことができるでしょう。"},"29":{"点数":42,"数意":"進退加護の運","解説":"順風な時には大海原で快走を楽しみ、波風が激しくなれば良港に逃れて安泰をみるという、いたって好転していく時には天恵加護の多い運です。たとえば良い職場で左遷されたような場合でも、実は後任者が災難をこうむり、この無傷で栄転できるというわけです。"},"30":{"点数":25,"数意":"高速横転の運","解説":"かなり難しい問題でも幅広い処理能力をもっています。自分自身で過信するところがありますが、安全策よりも急速な大成果を期待させます。どうも過重な計画案を事後承諾の形でどんなに不適な存在となって地位も不安定になることがあります。さらに、㋙と㊃の数値合計が高いほど不動産の蓄財運を高めます。"},"31":{"点数":49,"数意":"志節温厚の運","解説":"この運の人は無理をしない円満な常識家です。潔でスマートさを感じさせる人柄が多いでしょう。過激な言葉や動作を好みませんから決してそう目にはなりません。弱腰に見えるところもありますが内心は鋭い洞察力を持っています。たとえば人から「話せ」と言って情を尽くして断ります。欠点は環境が荒れてくると常に判定をしてどちらにも片寄らない立場になります。"},"32":{"点数":33,"数意":"博愛献身の運","解説":"自分の苦労や犠牲性を惜しまずに、他人や公共のために奉仕することの多い運です。例えば救急病院の医師や看護婦のように、大変充実感をもって働きます。特性としては、すべてを公平に収めようとすることです。しかしこの逆うの特徴の一つは「まあまあ主義」をとるところです。"},"33":{"点数":30,"数意":"快刀乱麻の運","解説":"非常に正義感が強くて大義名分に添った高いプライドも高い運です。道徳教科書のような厳しい律義な生き方を自分だけではなく他にも求める気持が強いので人と争うことなく生活を心掛けます。しかし、このような決断力をもっていますが大きな刀を一刀両断にするのですが考え方で自分が損をしてもいいという少々混乱した状態になっています。"},"34":{"点数":27,"数意":"先鋭後折の運","解説":"この運をもつ人が好転して進む時は人々の義望を一身に受けてスマートです。外見では大胆に見えても内面は繊細な神経をもち、天才的ともいえる優れた一方のリーダーとして期待を集めます。さらに多彩な成果を手にしますが、一方の運が悪くなると「剛刀はよく切れる」のような諺に代表されるような「才天折」的な傾向があります。"},"35":{"点数":36,"数意":"良妻賢母の運","解説":"この運の特徴は「縁の下の力」的な協力者となることです。したがって脇役としての価値を高く評価する主役に協力して事を進めれば、一人で役的な人物を得られるならば飛躍のチャンスは次々と現われます。一人で得られるならば協力して二人の人で実現できます。その人たちとの協調度によって大きな差を生むことになります。"},"36":{"点数":20,"数意":"没我仁侠の運","解説":"「無法松の一生」に登場する主人公「松吉」のように、特定の人物や仕事に惚れたが最後、「たとえ火の中水の中」でも一途に思いこんで採算ぬきで行動します。そのために深情けの押し売りを他の人にも強要してしまったり、裏切られたりするのが欠点です。"},"37":{"点数":45,"数意":"大器晩成の運","解説":"小さな川のせせらぎではなく、中国大陸を流れる揚子江やエジプトのナイル川のように、遠大な目標に向かって悠々と流れる大河のような運です。修業期の前半は沼地と砂地をもとにより好み正攻法で進むタイプですから地道な努力が続くのが特徴です。後半は歳月をへるにしたがい好循環を招き、成果は大きな差を生むこととになります。"},"38":{"点数":15,"数意":"大志空転の運","解説":"やもすれば理論が先走って、砂上の楼閣のように現実ばなれした計画を進めていきますが、崩れ始めると夢いっぱいの後はくずれやすいのです。この運の特性である「豊かな空想力」を現実のものにして良い協力者の協力が大切です。この運の特性を先行させるためには自分の専門的な知識を修得することが必要です。"},"39":{"点数":43,"数意":"万難征覇の運","解説":"この運をもつ人は人生の前半では苦労が多く、後半に入ると一時は暗雲が晴れだして巻き返すテンポを築き始めます。幾多の難問を押しつぶされるような大失敗をしてから、一つの堅実な大器となり大きな基盤を確立できます。その特性として相手の慎重さや動きの裏を探って一つずつ確実に応答する慎重な図太い動きをする運です。"},"40":{"点数":22,"数意":"野心独走の運","解説":"敏感なところがあり、決断力も早く、自分を中心にした権威を誇示したがる傾向があります。大きな利益をあげていくために自分の考え方で事を進め、人々の反感や妨害を招くことも多いです。先の見通しが暗くて不安な状態に力を注ぐこと、独自の野心を実現したい欲望が強いので自分だけの利益を追求することになります。"},"41":{"点数":48,"数意":"衆望包括の運","解説":"この運をもつ人は実現したいと思う大きな計画を秘めておいて、これを着実に進めていく計画実現力の高い運です。具体的などのような解決トラブルが起こっても良い解決策を計っていきます。いつも守備性と、どのような場合にも具体的な対応策を常に考え備えておく堅実さがあります。"},"42":{"点数":25,"数意":"多種多芸の運","解説":"周囲の事情から好きも嫌いもなく、あちらに行ったりこちらに行ったりという流転の人生を送る運です。好奇心が強くて何事にも熱心に取り組むのですが途中まで変化して驚き、焦って収拾を計り対して、時間をかけて考え込んでいく割には効果的な成果に欠けるところが多くあります。"},"43":{"点数":26,"数意":"豪華内憂の運","解説":"いつも人々の耳目を集めるような理想目標を秘めて大きな計画を推し進めていきます。周囲の人々から拍手をもって送迎されるでしょう。しかし忽ち自滅状態を脱して無駄な出費や労力をさかずに地道な活動を続けることが大切です。忽ち自滅状態を脱して、無駄な出費や労力をさかずに地道な活動をさせる時に尊い価値を生みます。"},"44":{"点数":11,"数意":"喧騒収拾の運","解説":"この運をもつ人は実現したいと思う大きな計画を秘めておいて、具体的などのような解決トラブルが起こっても良い解決策を計っていきます。いつも守備性と、どのような場合にも具体的な対応策を常に考え備えておく堅実さがあります。この運をもつ人は実現したいと思う大きな計画を秘めておいて、これを着実に進めていく実力があります。"},"45":{"点数":29,"数意":"高層建築の運","解説":"現実的な厳しい観察力で一つ一つの問題点を分析する時には、俺まず常に大所高所の立場に立って行います。蜘蛛が巣作りをするように、左から右へ、一つを渡したり、上から下に糸を結んでいくように、一つ一つを組み合わせながら強固な基礎をこしらえていきます。着実に石橋を叩いて一挙に大飛躍を狙むとくよよく注意したいことがあります。"},"46":{"点数":3,"数意":"楽観悲哀の運","解説":"資産家の坊ちゃんのように、気楽観的な見通しをもっているところに対して熱中します。そのうちに、時でも事が悪化して驚き、焦って収拾を計り手間取ってしまいます。特に一人だけでするとこの現象は深刻になり、大きな悲哀を味わう人生となります。指導的な協力者との間にバランスのある考え方を常に心掛けることが大切です。"},"47":{"点数":34,"数意":"貸道具屋の運","解説":"この画数は資本家の運といわれるほど豊かな生活基盤に恵まれています。ちょっと何か動くと利が生じます。この画数は自分だけでは発揮できないとく、立派な協力者次第で完全な態勢が発揮できます。自他ともに良い結末を生むでしょう。"},"48":{"点数":35,"数意":"均衡調和の運","解説":"難しい問題を解決する時には、常に大所高所の立場に立って、左右上下のいずれにも片寄らないというタイプの運です。こうして多くの人々の信頼が集まり、グループの均衡の上に立った権威を保つ運です。象徴的な存在となり、これらの均衡調和の運です。忍耐をもって調和を計り、まとめ役として右派と左派をたくみに連結させていくことができます。"},"49":{"点数":1,"数意":"連鎖反応の運","解説":"いつもりで行なった一つの決断と行動が目標に影響を与えることは少なくて、意外な方面にまでその影響が広がってしまいます。次々に波及していく間、その解決の糸口を発見しようと焦っていく間、物事の決定にあたっては、些細な問題をよく考えて安全率を無視した浮気心で一発勝負を挑めば、大きな成功を得る場合もあります。"},"50":{"点数":18,"数意":"竜頭蛇尾の運","解説":"物事が好転していく時期には、自分の努力の成果まさることながら、人の援助力と好運とが重なって、一時はこのような発展を見せますが後の発展は続きません。しかしこの運をもつ人は、無理なことを極度に嫌い自然のペースで一歩の歩みを運に適応させていこうとする特性が多くあります。"},"51":{"点数":44,"数意":"新地開拓の運","解説":"人が難しい事として敬遠する問題と取り組み、ただ気長く辛抱強く難題を解決していきます。回転の早い智恵と先手先手と事を進めていって、時に分析していくような明敏さから人が見過ごしがちな小さな変事を日ざとく発見して積極的な意欲に恵まれています。"},"52":{"点数":46,"数意":"先駆勝利の運","解説":"積極的な意欲に恵まれています。先手先手と事を進めていって、人が見過ごしがちな小さな変事を日ざとく発見して先手を進めていきます。欠点は時に合理主義に徹しすぎて、孤立無援の苦境に立ち往生の苦悩をがんばり通すことができます。"},"53":{"点数":19,"数意":"平穏退屈の運","解説":"外見はいつも幸福の代表者のように羨望の目で見られます。しかし内面では人に話せぬ「ぜいたくな悩み」の多い運です。孤独な形で独占的な立場でしか享受できません。なお注意したいことは無意識のうちに自己中な欠点があります。"},"54":{"点数":2,"数意":"砂上走行の運","解説":"理想も高く計画性もあるのですが、いざ実行という段階を迎えてから手違いや雑用に気をとられ、いつもうまく機会を逸してしまっています。突発的な挫折が多く、すべきことは着実に踏みしめて進み、もし危なくなったと思ったら素早く切り換えながら損を覚悟の縮小と防備に早く切り換えることが大切です。"},"55":{"点数":24,"数意":"斜陽耐久の運","解説":"落日の陽光に追われるかのように常に自分の影を前にして後ろから太陽が追ってくる形で進んでいます。現状を無視した改革を計ろうとすれば忽ち再起を懸命に頑張り忍んでも、どんな苦境にあっても、いかなる犠牲を覚悟しなければなりません。断挫折の不安をかかえることになることとです。"},"56":{"点数":11,"数意":"傍観後手の運","解説":"理想も高くて計画性もあるのですが、いざ実行となると現実との接点を求めて調整していくうちに自分が破壊する危険に陥ります。また調子が出てきた頃には一カ所に神経が集中しすぎて、他の部分の調節が上手にできないところが大切です。"},"57":{"点数":29,"数意":"単騎功名の運","解説":"人が遺した遺産だとか、特殊な生活だとか環境にあって物事が好まれています。苦労は人並み以上ですが、自分のペースで充実して活動できれば自分でも驚くほど大きな態勢で、一匹狼のように師や先輩の立場の人に技術水準を踏み越えて進む、むしろ必要な運といえます。"},"58":{"点数":17,"数意":"乞食大将の運","解説":"大体この運の人は、無理なことを極度に嫌い自然のペースで一歩一歩的に生きることを願う気持が強いので、どうも積極的な態勢に欠けるところがあります。この変動をうまく活用する場合には、気は盛んな運です。"},"59":{"点数":6,"数意":"決戦放棄の運","解説":"初めは親から引き継いだ遺産だとか、特殊な生活を送る環境にあって物事が好まれています。ところが物事が好まれていても信用を失って孤立化の傾向を強めだし、順調に信用を失って孤立化の傾向で進んでいきます。不断なところのある運です。"},"60":{"点数":19,"数意":"動揺効果の運","解説":"とにかく次から次へと変化の激しい運です。外部からの突あげで内部からは崩れだして協力者を失います。これに慣れれば変動をうまく活用できます。苦労は人並み以上ですが犠牲を覚悟で積極的に立ち向かう活性が望まれます。"}};

function calc(s,m){
  const ns=s.length,nm=m.length;
  const g=(a,i)=>a[i]||0;
  let cells={};
  if(ns===3){
    const E1=s[0],G3s=s[1],G5=s[2],G7=g(m,0),G9=g(m,1);
    const C3=E1+G3s+G5,H6=G5+G7+G3s,H10=G9,I4=E1+H6,C8=G7+G9,I8=H6+H10;
    const G14=0,I12=H10+G14,C13=G14;
    const K2=E1+I8,K8=I4+I12,A8=C3+C13,K14=I8+G14;
    const D19=E1+G9,F19=I8+1,D23=(I4-E1)+C13,F23=K8-1;
    Object.assign(cells,{E1,G3:G3s,G5,H6,H10,I4,C8,I8,I12,K2,K8,A8,K14,D19,F19,D23,F23});
    return{I5:I4,C9:C8,K3:K2,I9:I8,K9:K8,A9:A8,D20:D19,I13:I12,D24:D23,F20:F19,F24:F23,K15:K14,cells,template:'XXX-XX'};
  }
  if(ns===1){
    const E2=1,E4=1,E6=1,H3=3,C4=3,G8=s[0],G10=g(m,0),I5=H3+G8;
    if(nm<=2){
      const G12=g(m,1),H11=G10+G12,I9=G8+H11,C9=G8+G10,I13=C9,C14=0;
      const K3=I9+H3,K9=I5+I13,A9=C4+C14,K15=I9+1;
      const D20=G10+E2,F20=I9+1,D24=C9+C14,F24=K9-1;
      Object.assign(cells,{E2,H3,G8,G10,G12,H11,I5,C9,I9,I13,K3,K9,A9,C14,K15,D20,F20,D24,F24});
      return{I5,C9,K3,I9,K9,A9,D20,I13,D24,F20,F24,K15,cells,template:'X-XX'};
    }else{
      const G12=g(m,1),G14=g(m,2),H11=G10+G12+G14,I9=G8+H11,C9=G8+G10,I13=C9,C14=G8;
      const K3=I9+H3,K9=I5+I13,A9=C4+C14,K15=I9+1;
      const D20=G10+E2,F20=I9+1,D24=C9+G14,F24=K9-1;
      Object.assign(cells,{E2,H3,G8,G10,G12,G14,H11,I5,C9,I9,I13,K3,K9,A9,C14,K15,D20,F20,D24,F24});
      return{I5,C9,K3,I9,K9,A9,D20,I13,D24,F20,F24,K15,cells,template:'X-XXX'};
    }
  }
  const G6=s[0],G8e=s[1],H7=G6+G8e,C4=G6+2,C14=G8e,I5_base=2+G6+G8e;
  if(nm<=1){
    const G10=g(m,0),I9=H7+G10,I5=I5_base,I13=0,C9=G10,K3=I9+2;
    const K9=I5+I13,A9=C4+C14,K15=I9,D20=A9,F20=I9+1,D24=I13,F24=K9-1;

    return{I5,C9,K3,I9,K9,A9,D20,I13,D24,F20,F24,K15,cells,template:'XX-X'};
  }else if(nm===2){
    const G10=g(m,0),G12=g(m,1),H11=G10+G12,I5=I5_base,I9=H7+H11,C9=G10+G8e,I13=G10+G8e,K3=I9+2;
    const K9=I5+I13,A9=C4+C14,K15=K3,D20=A9,F20=I9+1,D24=I13,F24=K9-1;
    Object.assign(cells,{G6,G8:G8e,H7,G10,G12,H11,I5,C9,I9,I13,K3,K9,A9,C4,C14,K15,D20,F20,D24,F24});
    return{I5,C9,K3,I9,K9,A9,D20,I13,D24,F20,F24,K15,cells,template:'XX-XX'};
  }else{
    const G10=g(m,0),G12=g(m,1),G14e=g(m,2),H11=G10+G12+G14e,I5=I5_base,I9=H7+H11,C9=G10+G8e,I13=G10+G8e,K3=I9+2;
    const K9=I5+I13,A9=C4+C14,K15=K3,D20=A9,F20=I9+1,D24=I13,F24=K9-1;
    Object.assign(cells,{G6,G8:G8e,H7,G10,G12,G14:G14e,H11,I5,C9,I9,I13,K3,K9,A9,C4,C14,K15,D20,F20,D24,F24});
    return{I5,C9,K3,I9,K9,A9,D20,I13,D24,F20,F24,K15,cells,template:'XX-XXX'};
  }
}

function calcTenchi(ns, nm) {
  let t = 4;
  while (t < ns || t < nm) t += 4;
  return { tenchi: t, A: t - ns, D: t - nm };
}

function calcCompany(s, m) {
  const ns = s.length, nm = m.length;
  const { tenchi, A, D } = calcTenchi(ns, nm);
  const B = s.reduce((a, b) => a + b, 0); // 姓文字合計（Ⓑ）
  const C = m.reduce((a, b) => a + b, 0); // 名文字合計（Ⓒ）
  const E = A + B;   // 姓の部総合計（Ⓔ）
  const F = C + D;   // 名の部総合計（Ⓕ）
  const H = s[0];    // 姓の一番上の文字の画数（Ⓗ）
  const Iv = 1;      // 定数Ⓘ = 常に1
  const J = m[0];    // 名の一番上の文字の画数（Ⓙ）
  const K = E - H;   // Ⓚ = Ⓔ - Ⓗ
  const L = F - J;   // Ⓛ = Ⓕ - Ⓙ

  const clamp = n => { while (n > 60) n -= 60; return n; };

  const I5  = clamp(Iv + J);
  const I9  = clamp(B + C);
  const C9  = clamp(K + L);
  const K3  = I9;
  const K9  = clamp(I5 + C9);
  const A9  = clamp(E + F);
  const I13 = clamp(L);
  const D20 = clamp(H + J);
  const D24 = clamp(L);
  const F20 = clamp(I9 + 1);
  const F24 = K9 > 1 ? clamp(K9 - 1) : 60;
  const K15 = K3;

  return {
    I5, C9, K3, I9, K9, A9, D20, I13, D24, F20, F24, K15,
    cells: { 'A':A, 'B':B, 'C':C, 'D':D, 'E':E, 'F':F, 'H':H, 'I':Iv, 'J':J, 'K':K, 'L':L, tenchi, ns, nm },
    template: '企業名'
  };
}

function suugi(n){n=Math.max(1,Math.min(60,Math.round(n)));return SQ[String(n)]}

function scl(p){return p>=40?'k':p>=25?'c':'x'}

function getChoushi(score) {
  return CHOUSHI.find(c => score >= c.min && score <= c.max) || CHOUSHI[CHOUSHI.length-1];
}

<script>

function getStrokes(chars){
  return chars.split('').map(c=>{
    if(JK[c]) return JK[c];
    // 康熙字典画数推定（未収録文字は0）
    return 0;
  });
}

function strokePreview(chars, el, warnEl){
  const s = getStrokes(chars);
  const unknown = chars.split('').filter((_,i)=>!s[i]);
  el.textContent = chars.split('').map((c,i)=>`${c}(${s[i]||'?'})`).join(' ');
  if(warnEl && unknown.length > 0){
    warnEl.textContent = '字画表にない文字: ' + unknown.join('');
  }
}

// =============================================
// 相性計算
// =============================================
function runOrgCompat(){

  const pMei = document.getElementById('person-mei').value.trim();

  if(!oSei){ alert('組織名を入力してください'); return; }

  const pSS = getStrokes(pSei).map(v=>v||1);
  const pMS = getStrokes(pMei).map(v=>v||1);

  // 組織の字画（社名本体＋法人格）
  const oSS = getStrokes(oSei).map(v=>v||1);
  const legalStrokes = legal && LEGAL_STROKES[legal] ? LEGAL_STROKES[legal] : [];
  const oMS = legalStrokes;

  // 計算
  const pPts = calc(pSS, pMS);
  const oPts = oMS.length > 0 ? calcCompany(oSS, oMS) : calcCompany(oSS, [1]); // 法人格なしの場合

  renderCompatResult(pPts, oPts, pSei+pMei, oSei+(legal||''), role);
}

// =============================================
// 相性スコア計算ロジック（原典準拠）
// =============================================
function calcCompatScore(pPts, oPts, role){
  // 役割別の重みキー
  const roleWeights = {
    ceo:     {pairs:[['K9','K9'],['I9','I9'],['K3','K3'],['A9','A9'],['I5','I5']], w:[3,2,2,2,1]},
    director:{pairs:[['K9','K9'],['I9','I9'],['K3','K3'],['I13','I13'],['A9','A9']], w:[2,2,2,2,2]},
    manager: {pairs:[['K3','K3'],['I13','I13'],['K9','K9'],['I9','I9'],['A9','A9']], w:[3,3,2,1,1]},
    staff:   {pairs:[['K3','K3'],['I13','I13'],['I9','I9'],['A9','A9'],['K9','K9']], w:[3,3,2,1,1]},
    partner: {pairs:[['K9','K9'],['K3','K3'],['I9','I9'],['A9','A9'],['I5','I5']], w:[2,2,2,2,2]},
    candidate:{pairs:[['K3','K3'],['I9','I9'],['I13','I13'],['A9','A9'],['K9','K9']], w:[3,2,2,2,1]}
  };
  const rw = roleWeights[role] || roleWeights['staff'];
  
  // 各ペアの相性スコアを計算
  let totalScore = 0, maxScore = 0;
  const details = [];
  
  rw.pairs.forEach(([pk, ok], i)=>{
    const pv = pPts[pk] || 1, ov = oPts[ok] || 1;
    const pScore = suugi(pv).点数, oScore = suugi(ov).点数;
    const w = rw.w[i];
    
    // 相性判定：同値・倍数・調和の関係
    const ratio = pv > ov ? pv/ov : ov/pv;
    const diff = Math.abs(pScore - oScore);
    
    // 調和係数（同じ画数＝完全相性、倍数関係＝準相性、差が小さい＝好相性）
    let harmony;
    if(pv === ov){ harmony = 1.0; }
    else if(pv % ov === 0 || ov % pv === 0){ harmony = 0.8; }
    else if(diff <= 5){ harmony = 0.7; }
    else if(diff <= 10){ harmony = 0.55; }
    else if(diff <= 20){ harmony = 0.4; }
    else { harmony = 0.25; }
    
    // 両方のスコアが高い場合はボーナス
    const avgScore = (pScore + oScore) / 2;
    const bonus = avgScore >= 40 ? 1.15 : avgScore >= 30 ? 1.05 : 1.0;
    
    const pairScore = Math.round(harmony * bonus * 100);
    totalScore += pairScore * w;
    maxScore += 100 * w;
    
    details.push({
      pk, ok, pv, ov, pScore, oScore, harmony, pairScore, w
    });
  });
  
  // 100点満点に正規化
  const normalized = Math.round(totalScore / maxScore * 100);
  return { score: normalized, details };
}

const PNAMES = {

    <div class="meter-grade" style="color:${grade.color}">${grade.label}　${score}点</div>`;
  setTimeout(()=>{

  // 総合判定文
  const judgeTexts = {

      + `${roleLabel}として${orgName}に携わることで、持てる力を最大限に発揮できます。`
      + `特に所得・社交・技能の分野で組織の数理と共鳴しており、長期的な繁栄が期待されます。`,

    mid: `相性スコア${score}点。${personName}と${orgName}の数理は普通の相性を示しています。`

    const psq = suugi(pv), osq = suugi(ov);
    const pcl = scl(psq.点数), ocl = scl(osq.点数);
    const diff = Math.abs(psq.点数 - osq.点数);
    const harmonyLabel = pv===ov?'✦完全':pv%ov===0||ov%pv===0?'◎準':diff<=5?'○良':diff<=15?'△普':'✗差';

    : ecoLevel==='mid'
    ? `合計${ecoTotal}点。経済的な相性は普通です。${pName}は${oName}での収入は平均的ですが、努力次第で向上させることができます。${pK9.点数 > oK9.点数 ? pName+'の所得力が組織の経済力を上回っています。より大きな舞台での活躍が向いているかもしれません。' : oName+'の経済力が'+pName+'の所得力を上回っています。組織の恩恵を最大限に活かしてください。'}`
    : `合計${ecoTotal}点。経済的な相性に課題があります。${pName}は${oName}において経済的な満足を得にくい可能性があります。収入に関する期待値を現実的に設定し、副収入や能力向上に努めることが大切です。`
}</p>`
  });

  // 2. 社交・人間関係の相性
  const pK3 = suugi(pPts.K3||1), oK3 = suugi(oPts.K3||1);
  const socialTotal = pK3.点数 + oK3.点数;
  const socialLevel = socialTotal>=70?'hi':socialTotal>=40?'mid':'lo';
  advices.push({
    title:'🤝 社交・人間関係の相性',
    level: socialLevel,
    body: `<p><strong>${pName}</strong>の社交数意：「${pK3.数意}」（${pK3.点数}点）</p>
<p><strong>${oName}</strong>の社交数意：「${oK3.数意}」（${oK3.点数}点）</p>
<p style="margin-top:8px">${
  socialLevel==='hi'
    ? `合計${socialTotal}点。両者の社交的な数理が高く調和しており、${pName}は${oName}の中で自然に良好な人間関係を築けます。上司・同僚・取引先との関係も良好で、組織の中で信頼を集めやすいでしょう。`
    : socialLevel==='mid'
    ? `合計${socialTotal}点。社交的な相性は普通です。人間関係において特別な問題は起きにくいですが、積極的なコミュニケーションを心がけることで、より良い関係を築けます。`
    : `合計${socialTotal}点。社交的な相性に注意が必要です。${pName}は${oName}の組織文化や人間関係のスタイルと合わない部分があるかもしれません。誤解を招かないよう言動に注意し、少数の信頼できる人間関係を丁寧に育てることが大切です。`
}</p>`
  });

  // 3. 職業・技能の相性
  const pD20 = suugi(pPts.D20||1), oD20 = suugi(oPts.D20||1);
  const pI13 = suugi(pPts.I13||1), oI13 = suugi(oPts.I13||1);
  const workTotal = pD20.点数 + oD20.点数 + pI13.点数 + oI13.点数;
  const workLevel = workTotal>=120?'hi':workTotal>=80?'mid':'lo';
  advices.push({
    title:'⚡ 職業適性・技能の相性',
    level: workLevel,
    body: `<p><strong>${pName}</strong>：職業「${pD20.数意}」（${pD20.点数}点）/ 技能「${pI13.数意}」（${pI13.点数}点）</p>
<p><strong>${oName}</strong>：職業「${oD20.数意}」（${oD20.点数}点）/ 技能「${oI13.数意}」（${oI13.点数}点）</p>
<p style="margin-top:8px">${
  workLevel==='hi'
    ? `合計${workTotal}点。仕事の適性と技能面での相性が非常に高いです。${pName}は${oName}での業務内容・職場環境に適しており、上司や先輩からの支援にも恵まれます。専門性を発揮して大きな成果を出せるでしょう。`
    : workLevel==='mid'
    ? `合計${workTotal}点。職業適性は普通程度の相性です。業務内容に慣れるまで多少時間がかかるかもしれませんが、継続的な努力で実力を発揮できます。特定の専門分野に集中することをおすすめします。`
    : `合計${workTotal}点。職業適性に調整が必要です。${pName}の技能・スタイルが${oName}の業務内容や職場環境と完全にはマッチしない可能性があります。担当分野や役割を工夫することで、持ち味を活かした働き方ができます。`
}</p>`
  });

  // 4. 役割別の特別アドバイス
  const roleAdvice = buildRoleAdvice(pPts, oPts, pName, oName, roleLabel, totalScore);
  advices.push(roleAdvice);

  return advices;
}

function buildRoleAdvice(pPts, oPts, pName, oName, roleLabel, score){
  const pI5 = suugi(pPts.I5||1), oI5 = suugi(oPts.I5||1);
  const pA9 = suugi(pPts.A9||1), oA9 = suugi(oPts.A9||1);
  
  const isCEO = roleLabel.includes('経営');
  const isPartner = roleLabel.includes('共同');
  
  let title, level, body;
  
  if(isCEO || isPartner){
    const leadership = pI5.点数 + pA9.点数;
    level = leadership>=70?'hi':leadership>=50?'mid':'lo';
    title = '👑 リーダーシップと経営適性';
    body = `<p><strong>${pName}</strong>の健康・愛情：「${pI5.数意}」（${pI5.点数}点）/ 能力：「${pA9.数意}」（${pA9.点数}点）</p>
<p><strong>${oName}</strong>の健康・愛情：「${oI5.数意}」（${oI5.点数}点）/ 能力：「${oA9.数意}」（${oA9.点数}点）</p>
<p style="margin-top:8px">${
  level==='hi'
    ? `${pName}のリーダーシップ指数${leadership}点は高く、${oName}を率いる経営者として十分な資質があります。組織の数意「${oI5.数意}」と個人の数意の相性が良く、経営判断の多くで組織が追い風となるでしょう。`
    : level==='mid'
    ? `${pName}のリーダーシップ指数${leadership}点は普通です。${oName}の経営者として実力を発揮するためには、右腕となる補佐役を見つけることが重要です。特に${pA9.点数 < pI5.点数 ? '能力面での補佐' : '精神的なサポート'}が助けになります。`
    : `${pName}のリーダーシップ指数${leadership}点は、経営者として厳しい状況が続く可能性があります。${oName}の組織数意と個人数意の差が大きく、経営上の決断で迷いが生じやすいです。信頼できる参謀を置き、独断専行を避けることが大切です。`
}
<p style="margin-top:6px;font-size:11px;color:var(--mist)">※ 組織との相性総合スコア：${score}点　（${score>=65?'経営者として活躍できる環境です':score>=45?'努力次第で成果を出せます':'組織改革か役割変更を検討することも選択肢です'}）</p>`;
  } else {
    const harmony = Math.abs(pI5.点数 - oI5.点数) + Math.abs(pA9.点数 - oA9.点数);
    level = harmony<=20?'hi':harmony<=40?'mid':'lo';
    title = '🌱 組織への適応と成長';
    body = `<p><strong>${pName}（${roleLabel}）</strong>の健康・性格：「${pI5.数意}」（${pI5.点数}点）</p>
<p><strong>${oName}</strong>の文化数意：「${oI5.数意}」（${oI5.点数}点）</p>
<p style="margin-top:8px">${
  level==='hi'
    ? `個人と組織の性格的な数意の差が小さく（差${harmony}点）、${pName}は${oName}の組織文化に自然になじめます。ストレスなく働きやすく、長期的に実力を発揮できる職場です。`
    : level==='mid'
    ? `個人と組織の性格的な数意に適度な差（差${harmony}点）があります。慣れるまでに時間がかかりますが、相互理解が深まれば自分らしさを発揮できます。組織の文化を理解しながら自分のペースで成長してください。`
    : `個人と組織の性格的な数意の差が大きい（差${harmony}点）ため、組織の文化や価値観と個人の気質が合わない部分があります。自分の強みを活かせる部署や役割を見つけることが重要です。長期的には異動や転職を視野に入れることも選択肢です。`
}`;
  }
  
  return { title, level, body };
}
</script>
</body>
