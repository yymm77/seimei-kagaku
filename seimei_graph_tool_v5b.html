<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>姓名科学グラフ入力ツール v5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
header{background:#16213e;border-bottom:2px solid #0f3460;padding:7px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
header h1{font-size:13px;font-weight:600;color:#e94560;}
.nav{background:#0f1923;padding:6px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #0f3460;flex-shrink:0;flex-wrap:wrap;}
.btn{padding:5px 12px;border-radius:4px;border:none;cursor:pointer;font-size:11px;font-family:inherit;font-weight:600;}
.btn-sec{background:#0f3460;color:#ddd;}.btn-sec:hover{background:#1a4a80;}
.btn-suc{background:#1a7a4a;color:#fff;}
.btn-warn{background:#7a4a0a;color:#fff;}
.btn-red{background:#e94560;color:#fff;}
.graph-num{font-size:18px;font-weight:700;color:#e94560;min-width:60px;text-align:center;}
.main{display:flex;flex:1;overflow:hidden;}
.left{display:flex;flex-direction:column;flex:1;overflow:hidden;border-right:1px solid #0f3460;}
.hint{background:#16213e;padding:5px 12px;font-size:11px;color:#aaa;border-bottom:1px solid #0f3460;flex-shrink:0;display:flex;gap:16px;align-items:center;}
.canvas-wrap{flex:1;overflow:auto;background:#2a2a2a;position:relative;}
#imageCanvas{display:block;cursor:crosshair;}
.right{width:300px;display:flex;flex-direction:column;background:#16213e;flex-shrink:0;}
.right-status{padding:8px 12px;border-bottom:1px solid #0f3460;flex-shrink:0;}
.cur-age{font-size:20px;font-weight:700;color:#ffcc44;text-align:center;}
.cur-step{font-size:11px;text-align:center;padding:4px 8px;border-radius:4px;margin:4px 0;}
.step-top{background:#3a1a1a;color:#ff9999;border:1px solid #e94560;}
.step-bot{background:#1a1a3a;color:#9999ff;border:1px solid #4466ff;}
.step-none{background:#1a3a1a;color:#99ff99;border:1px solid #44cc44;}
.snap-val{font-size:14px;font-weight:700;color:#ffcc44;text-align:center;min-height:22px;}
.prog-bar-w{background:#0f1923;border-radius:3px;height:5px;margin:4px 0;}
.prog-bar{background:#e94560;height:5px;border-radius:3px;transition:width 0.2s;}
.prog{font-size:11px;color:#888;text-align:center;margin-bottom:6px;}
.tabs{display:flex;border-bottom:1px solid #0f3460;flex-shrink:0;}
.tab{flex:1;padding:5px;text-align:center;font-size:11px;cursor:pointer;color:#888;border:none;background:none;font-family:inherit;}
.tab.active{color:#e94560;border-bottom:2px solid #e94560;background:#1a1a2e;}
.tab-content{display:none;flex:1;overflow:hidden;flex-direction:column;}
.tab-content.active{display:flex;}
.tbl-wrap{flex:1;overflow-y:auto;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{color:#e94560;padding:2px 4px;border-bottom:1px solid #0f3460;position:sticky;top:0;background:#16213e;text-align:center;font-size:10px;}
td{padding:3px 4px;text-align:center;color:#888;border-bottom:1px solid #0a1828;cursor:pointer;}
td:hover{background:#1a2a3a;}
tr.row-sel td{background:#2a2000;color:#ffcc44;font-weight:700;}
tr.row-done td{color:#88cc88;}
tr.row-part td{color:#ffaa44;}
.chart-wrap{flex:1;padding:10px;overflow:hidden;position:relative;}
#outCanvas{width:100%;height:100%;}
.status{padding:4px 12px;background:#0f1923;font-size:10px;color:#666;border-top:1px solid #0f3460;flex-shrink:0;}
.snap-ind{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;}
.snap-on{background:#1a4a1a;color:#88ff88;border:1px solid #44cc44;}
.snap-off{background:#2a2a2a;color:#666;border:1px solid #444;}
</style>
</head>
<body>
<header>
  <h1>姓名科学グラフ入力ツール v5</h1>
  <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
    <div class="snap-ind snap-on" id="snapInd">⦿ スナップ</div>
    <button class="btn btn-sec" onclick="toggleSnap()" style="font-size:10px;">切替</button>
  </div>
</header>
<div class="nav">
  <button class="btn btn-sec" onclick="prevGraph()">◀</button>
  <div class="graph-num" id="graphNumLabel">No.97</div>
  <button class="btn btn-sec" onclick="nextGraph()">▶</button>
  <span id="progressLabel" style="font-size:10px;color:#888;">1/8</span>
  <div style="width:1px;height:18px;background:#0f3460;"></div>
  <button class="btn btn-sec" onclick="changeZoom(-0.5)">－</button>
  <span id="zoomLabel" style="font-size:11px;min-width:32px;text-align:center;">1.5x</span>
  <button class="btn btn-sec" onclick="changeZoom(0.5)">＋</button>
  <div style="width:1px;height:18px;background:#0f3460;"></div>
  <button class="btn btn-warn" onclick="undoLast()">← 戻す</button>
  <button class="btn btn-warn" onclick="resetCurrent()">リセット</button>
  <button class="btn btn-suc" onclick="exportAllCSV()" style="margin-left:auto;">CSV出力</button>
  <button class="btn btn-red" onclick="showChart()">グラフ確認</button>
</div>
<div class="main">
  <div class="left">
    <div class="hint">
      <span>① 右表の行クリック→年齢選択</span>
      <span style="color:#ff9999;">② 棒の上端クリック（終点）</span>
      <span style="color:#9999ff;">③ 棒の下端クリック（始点）</span>
    </div>
    <div class="canvas-wrap">
      <canvas id="imageCanvas"></canvas>
    </div>
    <div class="status" id="statusBar">読み込み中...</div>
  </div>
  <div class="right">
    <div class="right-status">
      <div class="cur-age" id="curAge">—</div>
      <div class="cur-step step-none" id="curStep">← 表で年齢を選択</div>
      <div class="snap-val" id="snapVal">—</div>
      <div class="prog-bar-w"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
      <div class="prog" id="progText">0 / 41本</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('data')">データ表</button>
      <button class="tab" onclick="switchTab('chart')">グラフ確認</button>
    </div>
    <div class="tab-content active" id="tab-data">
      <div class="tbl-wrap">
        <table id="dataTable">
          <tr><th>年齢</th><th>始点</th><th>終点</th><th>幅</th></tr>
        </table>
      </div>
    </div>
    <div class="tab-content" id="tab-chart">
      <div class="chart-wrap">
        <canvas id="outCanvas" role="img" aria-label="読み取り結果グラフ"></canvas>
      </div>
    </div>
  </div>
</div>

let currentIdx=0, zoom=1.5, snapEnabled=true;

function initCS(idx){

    clickState[idx]={};
    for(let a=15;a<=55;a++) clickState[idx][a]={top:null,bottom:null};
  }

function getPD(idx){
  if(imgPixelData[idx]) return imgPixelData[idx];
  const img=loadedImgs[idx]; if(!img) return null;
  const tmp=document.createElement('canvas');
  tmp.width=img.width; tmp.height=img.height;
  tmp.getContext('2d').drawImage(img,0,0);
  imgPixelData[idx]=tmp.getContext('2d').getImageData(0,0,img.width,img.height);
  return imgPixelData[idx];
}

function brightness(pd,x,y){
  if(x<0||y<0||x>=pd.width||y>=pd.height) return 255;
  const i=(y*pd.width+x)*4;
  return(pd.data[i]+pd.data[i+1]+pd.data[i+2])/3;
}

function findEdge(imgX,imgY,idx,findTop){
  if(!snapEnabled) return imgY;
  const pd=getPD(idx); if(!pd) return imgY;
  const r=18;

  if(!dark.length) return imgY;
  let groups=[],g=[dark[0]];
  for(let i=1;i<dark.length;i++){

    const m=(grp[0]+grp[grp.length-1])/2,bm=(b[0]+b[b.length-1])/2;
    return Math.abs(m-imgY)<Math.abs(bm-imgY)?grp:b;
  });
  return findTop?best[0]:best[best.length-1];
}

function yToScore(imgY,idx){
  const g=GRAPHS[idx],img=loadedImgs[idx]; if(!img) return 50;
  const cy=g.centerPct/100*img.height,ty=g.topPct/100*img.height;
  return Math.max(0,Math.min(100,Math.round((cy-imgY)/(cy-ty)*50+50)));
}

function imgCoord(e){
  const r=ic.getBoundingClientRect();
  return{x:Math.round((e.clientX-r.left)/zoom),y:Math.round((e.clientY-r.top)/zoom)};
}

function selectAge(age){
  selectedAge=age;
  const s=clickState[currentIdx]&&clickState[currentIdx][age];
  if(s&&s.top!==null&&s.bottom!==null) clickStep='top';
  else if(s&&s.top!==null) clickStep='bottom';
  else clickStep='top';
  updateUI(); renderGraph(currentIdx); updateTable();
}

ic.addEventListener('mousemove',e=>{
  const{x,y}=imgCoord(e);
  const snY=findEdge(x,y,currentIdx,clickStep==='top');
  const score=yToScore(snY,currentIdx);
  document.getElementById('snapVal').textContent=(snapEnabled?'吸着: ':'位置: ')+score+'点';
  renderGraph(currentIdx);
  const dx=x*zoom,dy=snY*zoom;
  ctx.save();
  ctx.strokeStyle='#ffcc00';ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(dx-10,dy);ctx.lineTo(dx+10,dy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(dx,dy-10);ctx.lineTo(dx,dy+10);ctx.stroke();
  ctx.beginPath();ctx.arc(dx,dy,5,0,Math.PI*2);ctx.stroke();
  ctx.restore();
});

ic.addEventListener('mouseleave',()=>{
  document.getElementById('snapVal').textContent='—';
  if(loadedImgs[currentIdx]) renderGraph(currentIdx);
});

ic.addEventListener('click',e=>{
  const{x,y}=imgCoord(e);
  const snY=findEdge(x,y,currentIdx,clickStep==='top');
  const score=yToScore(snY,currentIdx);
  initCS(currentIdx);
  const cs=clickState[currentIdx];
  if(clickStep==='top'){
    cs[selectedAge].top=score;
    clickStep='bottom';
    document.getElementById('statusBar').textContent=selectedAge+'歳 上端='+score+'点 → 下端をクリック';
  } else {
    cs[selectedAge].bottom=score;
    document.getElementById('statusBar').textContent=selectedAge+'歳 完了（始点='+Math.min(cs[selectedAge].top,cs[selectedAge].bottom)+', 終点='+Math.max(cs[selectedAge].top,cs[selectedAge].bottom)+'）';
    let next=null;
    for(let a=selectedAge+1;a<=55;a++){if(!cs[a].top||!cs[a].bottom){next=a;break;}}
    if(!next) for(let a=15;a<selectedAge;a++){if(!cs[a].top||!cs[a].bottom){next=a;break;}}
    if(next) selectAge(next);
    else{selectedAge=null;clickStep='top';}
  }
  updateUI();renderGraph(currentIdx);updateTable();
});

function renderGraph(idx){
  const img=loadedImgs[idx]; if(!img) return;
  const g=GRAPHS[idx];
  const w=Math.round(img.width*zoom),h=Math.round(img.height*zoom);
  ic.width=w;ic.height=h;
  ctx.clearRect(0,0,w,h);
  ctx.drawImage(img,0,0,w,h);
  const tY=g.topPct/100*h,cY=g.centerPct/100*h,bY=g.bottomPct/100*h;
  const lX=g.leftPct/100*w,rX=g.rightPct/100*w;
  drawHL(tY,'rgba(255,80,80,0.35)');
  drawHL(cY,'rgba(80,255,80,0.65)');
  drawHL(bY,'rgba(80,80,255,0.35)');
  initCS(idx);
  const cs=clickState[idx];
  const cy2=g.centerPct/100*img.height,ty2=g.topPct/100*img.height;
  const pxPt=(cy2-ty2)/50;
  for(let age=15;age<=55;age++){
    const s=cs[age];
    const colX=lX+(rX-lX)*(age-15)/40;
    if(age===selectedAge){
      ctx.save();ctx.strokeStyle='rgba(255,220,0,0.7)';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
      ctx.beginPath();ctx.moveTo(colX,tY);ctx.lineTo(colX,bY);ctx.stroke();ctx.restore();
    }
    if(s.top!==null){
      const tPx=(cy2-(s.top-50)*pxPt)*zoom;
      const done=s.bottom!==null;
      ctx.save();
      ctx.strokeStyle=done?'rgba(0,220,255,0.9)':'rgba(255,180,0,0.9)';
      ctx.lineWidth=done?3:2;ctx.setLineDash([]);
      ctx.beginPath();ctx.moveTo(colX-7,tPx);ctx.lineTo(colX+7,tPx);ctx.stroke();
      if(done){
        const bPx=(cy2-(s.bottom-50)*pxPt)*zoom;
        ctx.beginPath();ctx.moveTo(colX,tPx);ctx.lineTo(colX,bPx);ctx.stroke();
        ctx.beginPath();ctx.moveTo(colX-7,bPx);ctx.lineTo(colX+7,bPx);ctx.stroke();
      }
      ctx.restore();
    }
  }
}

function drawHL(y,color){
  ctx.save();ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.setLineDash([8,4]);
  ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(ic.width,y);ctx.stroke();ctx.restore();
}

function updateUI(){
  const age=selectedAge;
  document.getElementById('curAge').textContent=age?age+'歳':'完了';
  if(!age){
    document.getElementById('curStep').className='cur-step step-none';
    document.getElementById('curStep').textContent='← 表で年齢を選択';
  } else if(clickStep==='top'){
    document.getElementById('curStep').className='cur-step step-top';
    document.getElementById('curStep').textContent='▼ 上端クリック（終点）';
  } else {
    document.getElementById('curStep').className='cur-step step-bot';
    document.getElementById('curStep').textContent='▲ 下端クリック（始点）';
  }
  const cs=clickState[currentIdx]||{};
  const done=Object.values(cs).filter(s=>s.top!==null&&s.bottom!==null).length;
  document.getElementById('progBar').style.width=(done/41*100)+'%';
  document.getElementById('progText').textContent=done+'/41本';
}

function updateTable(){
  const cs=clickState[currentIdx]||{};
  let html='<tr><th>年齢</th><th>始点</th><th>終点</th><th>幅</th></tr>';
  for(let age=15;age<=55;age++){
    const s=cs[age]||{top:null,bottom:null};
    const isSel=age===selectedAge;
    const isDone=s.top!==null&&s.bottom!==null;
    const isPart=s.top!==null&&!isDone;
    const cls=isSel?'row-sel':isDone?'row-done':isPart?'row-part':'';
    let st='—',en='—',wd='—';
    if(isDone){st=Math.min(s.top,s.bottom);en=Math.max(s.top,s.bottom);wd=en-st;}
    else if(isPart){en=s.top;}
    html+='<tr class="'+cls+'" onclick="selectAge('+age+')"><td>'+age+'</td><td>'+st+'</td><td>'+en+'</td><td>'+wd+'</td></tr>';
  }
  document.getElementById('dataTable').innerHTML=html;
  if(selectedAge){
    const rows=document.getElementById('dataTable').querySelectorAll('tr');
    const ri=selectedAge-14;
    if(rows[ri]) rows[ri].scrollIntoView({block:'nearest',behavior:'auto'});
  }
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['data','chart'][i]===name);
  });
  document.querySelectorAll('.tab-content').forEach(c=>{
    c.classList.remove('active');
  });
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='chart') showChart();
}

function showChart(){
  const cs=clickState[currentIdx]||{};
  const labels=[],starts=[],lengths=[];
  for(let age=15;age<=55;age++){
    const s=cs[age]||{top:null,bottom:null};
    labels.push(age+'歳');
    if(s.top!==null&&s.bottom!==null){
      const st=Math.min(s.top,s.bottom),en=Math.max(s.top,s.bottom);
      starts.push(st);lengths.push(en-st);
    } else{starts.push(50);lengths.push(0);}
  }
  if(chartInstance){chartInstance.destroy();chartInstance=null;}
  const clP={id:'cl',afterDraw(ch){
    const c=ch.ctx,y=ch.scales.y.getPixelForValue(50);
    c.save();c.beginPath();c.moveTo(ch.scales.x.left,y);c.lineTo(ch.scales.x.right,y);
    c.strokeStyle='rgba(180,0,0,0.7)';c.lineWidth=1.5;c.setLineDash([6,4]);c.stroke();c.restore();
  }};
  chartInstance=new Chart(oc,{
    type:'bar',plugins:[clP],
    data:{labels,datasets:[
      {data:starts,backgroundColor:'rgba(0,0,0,0)',borderWidth:0,barPercentage:0.75,categoryPercentage:0.9},
      {data:lengths,backgroundColor:'rgba(24,95,165,0.85)',borderWidth:0,barPercentage:0.75,categoryPercentage:0.9}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{stacked:true,ticks:{font:{size:8},maxRotation:90,minRotation:90,autoSkip:false},grid:{display:false}},
        y:{stacked:true,min:0,max:100,ticks:{stepSize:10}}
      }
    }
  });
}

function toggleSnap(){
  snapEnabled=!snapEnabled;
  const el=document.getElementById('snapInd');
  el.className='snap-ind '+(snapEnabled?'snap-on':'snap-off');
  el.textContent=snapEnabled?'⦿ スナップ':'○ スナップOFF';
}

function changeZoom(d){
  zoom=Math.max(0.8,Math.min(5.0,zoom+d));
  document.getElementById('zoomLabel').textContent=zoom.toFixed(1)+'x';
  if(loadedImgs[currentIdx]) renderGraph(currentIdx);
}

function undoLast(){
  const cs=clickState[currentIdx]; if(!cs) return;
  if(selectedAge&&cs[selectedAge]){
    if(clickStep==='bottom'&&cs[selectedAge].top!==null){
      cs[selectedAge].top=null;clickStep='top';
      updateUI();renderGraph(currentIdx);updateTable();return;
    }
  }
  for(let a=selectedAge?selectedAge:55;a>=15;a--){
    if(cs[a]&&cs[a].bottom!==null){cs[a].bottom=null;selectAge(a);clickStep='bottom';return;}
    if(cs[a]&&cs[a].top!==null){cs[a].top=null;selectAge(a);clickStep='top';return;}
  }
}

function resetCurrent(){
  if(!confirm('このグラフをリセットしますか？')) return;
  clickState[currentIdx]=null;initCS(currentIdx);
  selectedAge=15;clickStep='top';
  updateUI();renderGraph(currentIdx);updateTable();
}

function loadGraph(idx){
  currentIdx=idx;
  const g=GRAPHS[idx];
  document.getElementById('graphNumLabel').textContent='No.'+g.graphNum;
  document.getElementById('progressLabel').textContent=(idx+1)+'/'+GRAPHS.length;
  initCS(idx);selectedAge=15;clickStep='top';
  updateUI();updateTable();
  if(loadedImgs[idx]){renderGraph(idx);return;}
  const image=new Image();
  image.onload=()=>{
    loadedImgs[idx]=image;
    renderGraph(idx);
    document.getElementById('statusBar').textContent='グラフ'+g.graphNum+'読み込み完了';
  };
  image.src=g.img;
}

function prevGraph(){if(currentIdx>0)loadGraph(currentIdx-1);}
function nextGraph(){if(currentIdx<GRAPHS.length-1)loadGraph(currentIdx+1);}

function exportAllCSV(){
  let csv='グラフ番号,年齢,始点,終点\n',count=0;
  GRAPHS.forEach((g,idx)=>{
    const cs=clickState[idx];if(!cs)return;
    for(let age=15;age<=55;age++){
      const s=cs[age];
      if(s&&s.top!==null&&s.bottom!==null){
        csv+=g.graphNum+','+age+','+Math.min(s.top,s.bottom)+','+Math.max(s.top,s.bottom)+'\n';
        count++;
      }
    }
  });
  if(!count){alert('データがありません');return;}
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv'}));
  a.download='seimei_graphs.csv';a.click();
}

loadGraph(0);
</script>
