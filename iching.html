<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>易経門 — 周易占術ポータル</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1208;
  --ink-light: #3d2b0e;
  --paper: #f2ead8;
  --paper-dark: #e8dcc4;
  --gold: #8a6914;
  --gold-light: #c9a84c;
  --vermillion: #8b2020;
  --vermillion-light: #c0392b;
  --jade: #2d5a3d;
  --mist: rgba(26,18,8,0.06);
  --border: rgba(138,105,20,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Serif JP', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* 和紙テクスチャ背景 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(138,105,20,0.02) 2px, rgba(138,105,20,0.02) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 8px, rgba(138,105,20,0.015) 8px, rgba(138,105,20,0.015) 9px);
  pointer-events: none;
  z-index: 0;
}

/* ヘッダー */
header {
  position: relative;
  text-align: center;
  padding: 48px 20px 36px;
  border-bottom: 2px solid var(--border);
  background: linear-gradient(180deg, rgba(138,105,20,0.08) 0%, transparent 100%);
}

.site-title {
  font-family: 'Shippori Mincho', serif;
  font-size: clamp(2rem, 6vw, 4rem);
  font-weight: 700;
  letter-spacing: 0.3em;
  color: var(--ink);
  text-shadow: 2px 2px 0 rgba(138,105,20,0.2);
}

.site-title span {
  color: var(--gold);
}

.site-subtitle {
  margin-top: 8px;
  font-size: 0.85rem;
  letter-spacing: 0.4em;
  color: var(--ink-light);
  opacity: 0.7;
}

/* ナビゲーション */
nav {
  display: flex;
  justify-content: center;
  gap: 0;
  border-bottom: 1px solid var(--border);
  background: rgba(242,234,216,0.9);
  position: sticky;
  top: 0;
  z-index: 100;
}

nav button {
  padding: 14px 28px;
  background: none;
  border: none;
  border-right: 1px solid var(--border);
  font-family: 'Noto Serif JP', serif;
  font-size: 0.9rem;
  letter-spacing: 0.15em;
  color: var(--ink-light);
  cursor: pointer;
  transition: all 0.2s;
}

nav button:last-child { border-right: none; }
nav button:hover { background: rgba(138,105,20,0.1); color: var(--ink); }
nav button.active {
  background: var(--ink);
  color: var(--paper);
}

/* メインコンテンツ */
main {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

.section { display: none; }
.section.active { display: block; }

/* ===== 占いセクション ===== */
.oracle-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

@media (max-width: 700px) {
  .oracle-layout { grid-template-columns: 1fr; }
}

.panel {
  background: rgba(255,255,255,0.4);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 28px;
}

.panel-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.1rem;
  letter-spacing: 0.25em;
  color: var(--gold);
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  min-height: 120px;
  background: rgba(242,234,216,0.6);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 12px;
  font-family: 'Noto Serif JP', serif;
  font-size: 0.9rem;
  color: var(--ink);
  resize: vertical;
  outline: none;
}

textarea:focus { border-color: var(--gold); }

.btn-oracle {
  display: block;
  width: 100%;
  margin-top: 16px;
  padding: 14px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  font-family: 'Shippori Mincho', serif;
  font-size: 1rem;
  letter-spacing: 0.3em;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-oracle:hover { background: var(--ink-light); }
.btn-oracle:disabled { opacity: 0.5; cursor: not-allowed; }

/* 筮竹アニメーション */
.yarrow-container {
  text-align: center;
  padding: 20px 0;
}

.yarrow-sticks {
  display: flex;
  justify-content: center;
  gap: 3px;
  margin-bottom: 12px;
  height: 80px;
  align-items: flex-end;
}

.stick {
  width: 3px;
  background: linear-gradient(180deg, var(--gold-light), var(--gold));
  border-radius: 2px;
  transition: height 0.3s;
  opacity: 0.8;
}

.divination-progress {
  font-size: 0.8rem;
  letter-spacing: 0.2em;
  color: var(--ink-light);
  margin-top: 8px;
}

/* 卦の表示 */
.hexagram-display {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.hex-pair {
  display: flex;
  gap: 40px;
  justify-content: center;
  flex-wrap: wrap;
}

.hex-card {
  text-align: center;
}

.hex-card .label {
  font-size: 0.75rem;
  letter-spacing: 0.3em;
  color: var(--ink-light);
  margin-bottom: 8px;
}

.hex-lines {
  display: flex;
  flex-direction: column-reverse;
  gap: 6px;
  margin-bottom: 12px;
}

.hex-line {
  display: flex;
  justify-content: center;
  gap: 4px;
  align-items: center;
}

.line-seg {
  height: 6px;
  background: var(--ink);
  border-radius: 1px;
  transition: all 0.4s;
}

.line-yang .line-seg { width: 44px; }
.line-yin .line-seg { width: 18px; }

.line-changing { position: relative; }
.line-changing .line-seg { background: var(--vermillion); }

.hex-name {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.4rem;
  letter-spacing: 0.1em;
  color: var(--ink);
}

.hex-number {
  font-size: 0.75rem;
  color: var(--gold);
  margin-top: 4px;
}

.changing-marker {
  font-size: 0.9rem;
  color: var(--vermillion);
}

/* AI解釈エリア */
.ai-result {
  margin-top: 24px;
  border-top: 1px solid var(--border);
  padding-top: 20px;
}

.ai-result h4 {
  font-size: 0.85rem;
  letter-spacing: 0.25em;
  color: var(--gold);
  margin-bottom: 12px;
}

.ai-result p {
  font-size: 0.9rem;
  line-height: 2;
  color: var(--ink);
}

.typing-cursor::after {
  content: '▋';
  animation: blink 1s infinite;
}

@keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }

/* ===== 64卦マトリックス ===== */
.matrix-header {
  text-align: center;
  margin-bottom: 28px;
}
.matrix-header h2 {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.8rem;
  letter-spacing: 0.3em;
  margin-bottom: 8px;
}
.matrix-header p {
  font-size: 0.85rem;
  color: var(--ink-light);
  letter-spacing: 0.15em;
}

/* 卦表ラッパー（横スクロール対応）*/
.matrix-wrapper {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

/* 9×9グリッド（左列+ヘッダー行） */
.matrix-grid {
  display: grid;
  grid-template-columns: 72px repeat(8, 1fr);
  gap: 4px;
  min-width: 620px;
}

/* コーナーセル */
.matrix-corner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 6px 4px;
  background: var(--ink);
  color: var(--paper);
  font-family: 'Shippori Mincho', serif;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-align: center;
  line-height: 1.6;
}

/* ヘッダーセル（上卦） */
.matrix-header-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 4px;
  background: rgba(138,105,20,0.12);
  border: 1px solid var(--border);
  text-align: center;
  cursor: default;
}

/* 左列セル（下卦） */
.matrix-row-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 4px;
  background: rgba(138,105,20,0.08);
  border: 1px solid var(--border);
  text-align: center;
  cursor: default;
}

.trigram-name {
  font-family: 'Shippori Mincho', serif;
  font-size: 1rem;
  color: var(--gold);
  font-weight: 700;
  margin-bottom: 4px;
}

.trigram-symbol {
  font-size: 1.4rem;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 4px;
}

/* 卦セル */
.matrix-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.3);
  cursor: pointer;
  transition: all 0.2s;
  padding: 8px 4px;
  text-align: center;
  min-height: 100px;
}

.matrix-cell:hover {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
  z-index: 10;
  position: relative;
}
.matrix-cell:hover .cell-num { color: var(--gold-light); }
.matrix-cell:hover .hex-mini-line { background: var(--paper) !important; }

.cell-num {
  font-size: 0.65rem;
  color: var(--gold);
  margin-bottom: 3px;
  font-weight: 700;
}

.cell-name {
  font-family: 'Shippori Mincho', serif;
  font-size: clamp(0.6rem, 1.2vw, 0.8rem);
  letter-spacing: 0.03em;
  margin-top: 4px;
  line-height: 1.3;
}

/* セル内の小さな卦象 */
.hex-mini {
  display: flex;
  flex-direction: column-reverse;
  gap: 3px;
  margin: 2px 0;
}

.hex-mini-row {
  display: flex;
  justify-content: center;
  gap: 2px;
  align-items: center;
}

.hex-mini-line {
  height: 3px;
  border-radius: 1px;
  background: var(--ink);
  transition: background 0.2s;
}

.hex-mini-line.yang { width: 28px; }
.hex-mini-line.yin  { width: 11px; }

/* 卦詳細モーダル */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,18,8,0.75);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--paper);
  border: 2px solid var(--border);
  max-width: 680px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 36px;
  position: relative;
}

.modal-close {
  position: absolute;
  top: 16px;
  right: 20px;
  background: none;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  color: var(--ink-light);
}

.modal-hexagram {
  display: flex;
  gap: 24px;
  align-items: flex-start;
  margin-bottom: 28px;
}

.modal-lines {
  flex-shrink: 0;
}

.modal-info h2 {
  font-family: 'Shippori Mincho', serif;
  font-size: 2rem;
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}

.modal-info .reading {
  font-size: 0.85rem;
  color: var(--ink-light);
  letter-spacing: 0.2em;
  margin-bottom: 12px;
}

.modal-info .keyword {
  display: inline-block;
  padding: 3px 10px;
  border: 1px solid var(--gold);
  color: var(--gold);
  font-size: 0.8rem;
  letter-spacing: 0.15em;
  margin-right: 6px;
  margin-bottom: 4px;
}

.modal-section {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.modal-section h3 {
  font-size: 0.8rem;
  letter-spacing: 0.3em;
  color: var(--gold);
  margin-bottom: 10px;
}

.modal-section p {
  font-size: 0.88rem;
  line-height: 2;
  color: var(--ink);
}

/* ===== 記録セクション ===== */
.record-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.record-item {
  border: 1px solid var(--border);
  padding: 20px;
  background: rgba(255,255,255,0.35);
}

.record-item .date {
  font-size: 0.75rem;
  color: var(--gold);
  letter-spacing: 0.2em;
  margin-bottom: 6px;
}

.record-item .hex-name-row {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.1rem;
  margin-bottom: 8px;
}

.record-item .text-preview {
  font-size: 0.85rem;
  color: var(--ink-light);
  line-height: 1.8;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink-light);
  font-size: 0.9rem;
  letter-spacing: 0.2em;
  opacity: 0.6;
}

/* フッター */
footer {
  border-top: 2px solid var(--border);
  background: linear-gradient(0deg, rgba(138,105,20,0.08) 0%, transparent 100%);
  padding: 32px 20px;
  text-align: center;
}

.footer-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.footer-links {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
}

.footer-links a {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.85rem;
  letter-spacing: 0.15em;
  color: var(--gold);
  text-decoration: none;
  transition: opacity 0.2s;
}

.footer-links a:hover { opacity: 0.7; }

.footer-sep {
  color: var(--border);
  font-size: 0.85rem;
}

.footer-counter img {
  height: 20px;
  vertical-align: middle;
}

.footer-copy {
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  color: var(--ink-light);
  opacity: 0.7;
  line-height: 1.8;
}
  text-align: center;
  color: var(--gold);
  font-size: 1.2rem;
  letter-spacing: 0.5em;
  margin: 20px 0;
  opacity: 0.5;
}
</style>
</head>
<body>

<header>
  <div class="site-title">易<span>経</span>門</div>
  <div class="site-subtitle">周易占術ポータル — 第一分卧法（大衍の数）</div>
</header>

<nav>
  <button class="active" onclick="showSection('oracle')">占 卜</button>
  <button onclick="showSection('matrix')">六十四卦</button>
  <button onclick="showSection('records')">記 録</button>
</nav>

<main>

<!-- 占卜セクション -->
<div id="oracle" class="section active">
  <div class="oracle-layout">
    <!-- 左：入力 -->
    <div>
      <div class="panel">
        <div class="panel-title">問 卜</div>
        <textarea id="question-text" placeholder="今日の問いを記してください。
悩み・状況・問いかけ…
心の中にある言葉をそのままに。"></textarea>
        <button class="btn-oracle" id="btn-divine" onclick="startDivination()">　筮　竹　を　立　て　る　</button>
      </div>

      <!-- 筮竹アニメーション -->
      <div class="panel" id="yarrow-panel" style="display:none; margin-top:20px;">
        <div class="panel-title">大衍の数・第一分卧法</div>
        <div class="yarrow-container">
          <div class="yarrow-sticks" id="yarrow-sticks"></div>
          <div class="divination-progress" id="div-progress">第一爻を求めています…</div>
        </div>
      </div>
    </div>

    <!-- 右：結果 -->
    <div>
      <div class="panel" id="result-panel">
        <div class="panel-title">卦 象</div>
        <div id="hexagram-result">
          <div class="empty-state" style="padding:40px 0;">
            問いを入力して<br>筮竹を立ててください
          </div>
        </div>
        <div id="ai-result-area" style="display:none;">
          <div class="ai-result">
            <h4>◈ AI解釈（周易・Dr. Murphy）</h4>
            <p id="ai-text" class="typing-cursor"></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 64卦マトリックス -->
<div id="matrix" class="section">
  <div class="matrix-header">
    <h2>六十四卦一覧</h2>
    <p>卦をクリックすると詳細を表示します　／　縦：下卦　横：上卦</p>
  </div>
  <div class="matrix-wrapper">
    <div class="matrix-grid" id="matrix-grid"></div>
  </div>
</div>

<!-- 記録 -->
<div id="records" class="section">
  <div class="panel">
    <div class="panel-title">占卜の記録</div>
    <div id="record-list"></div>
  </div>
</div>

</main>

<footer>
  <div class="footer-inner">
    <div class="footer-links">
      <a href="https://yymm77.github.io/seimei-kagaku/" target="_blank">姓名科学の殿堂</a>
      <span class="footer-sep">｜</span>
      <a href="https://yymm77.github.io/seimei-kagaku/houigaku.html" target="_blank">方位学ポータル</a>
      <span class="footer-sep">｜</span>
      <a href="https://yymm77.github.io/seimei-kagaku/aisei.html" target="_blank">吉日・相性</a>
    </div>
    <div class="footer-counter">
      <img src="https://hits.sh/yymm77.github.io/seimei-kagaku/iching.svg?style=flat-square&color=b8960c&labelColor=1a1208&label=訪問者数" alt="訪問者数カウンター">
    </div>
    <div class="footer-copy">
      © 2025 日昇リサーチ株式会社 ／ 易経門 — 周易占術ポータル<br>
      <span style="font-size:0.75rem;opacity:0.6;">Dr. Murphy's I Ching に基づく解釈を収録</span>
    </div>
  </div>
</footer>

<!-- モーダル -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div class="modal-hexagram">
      <div class="modal-lines" id="modal-lines"></div>
      <div class="modal-info" id="modal-info"></div>
    </div>
    <div id="modal-sections"></div>
  </div>
</div>

<script>
// ============================
// 64卦データ（完全版）
// ============================
const TRIGRAMS = {
  heaven: { name:'乾', symbol:'☰', lines:[1,1,1] },
  lake:   { name:'兌', symbol:'☱', lines:[0,1,1] },
  fire:   { name:'離', symbol:'☲', lines:[1,0,1] },
  thunder:{ name:'震', symbol:'☳', lines:[1,0,0] },
  wind:   { name:'巽', symbol:'☴', lines:[0,1,0] },  // 下爻から
  water:  { name:'坎', symbol:'☵', lines:[0,1,0] },
  mountain:{ name:'艮', symbol:'☶', lines:[0,0,1] },
  earth:  { name:'坤', symbol:'☷', lines:[0,0,0] },
};

// 各卦データ: [0:番号, 1:卦名, 2:読み, 3:キーワード[], 4:lines[6](下から), 5:原典卦辞, 6:Murphy解釈]
const HEXAGRAMS = [
  [1,'乾為天','けんいてん',['創造','天','剛健'],[1,1,1,1,1,1],'元亨利貞。天の徳は大いなる創造の力である。','万物の始まり、純粋な創造の力。前進し続けよ。','この卦は男性性原理、創造的なものを表しています。その意味は乾（けん）として「元（げん）、亨（とお）り、利（り）、貞（てい）」とあります。すなわち元は春に出発し、亨は夏に成長発展していくさま、芽生え「春夏秋冬」の元、利は秋の実り、貞は冬に備えることです。積極的な取り組みで願望や計画を待っていても幸運は来ません。ただし幸運は他動的に与えられるものではなく、自らの思考と行動によって、これを迎えるものです。潜在意識の力を使って、自己の運命を創造するのです。'],
  [2,'坤為地','こんいち',['受容','地','柔順'],[0,0,0,0,0,0],'元亨、利牝馬之貞。大地の包容力で万物を育む。','受容と忍耐の力。柔らかさの中に真の強さがある。','すべて陰からなる卦です。その意味は乾為天と同じ「大いに望みがかなう」ですが、乾が男性性原理に支配されているのに対し、こちらは女性的原理に支配されています。坤（こん）は潜在意識をあらわしています。後、つまり従であることが、成功や目的達成につながることを示しています。坤は、元いに享る。牝馬の貞に利ろし、とあり、牝馬に利ろしとは女性性原理に従うことで、こちらは女性的創造に関わります。それは受け入れることによって、偉大なものを創造する潜在的能動性があるのです。願望や計画を潜在意識に委ねることが大切ですが、その実践に当たっては、信念と信頼をもって正しく考えながら行動することです。'],
  [3,'水雷屯','すいらいちゅん',['困難の始め','萌芽','苦労'],[1,0,0,0,1,0],'屯、元亨利貞、勿用有攸往、利建侯。事の始めは困難が伴う。','新しいことは困難から始まる。焦らず助けを求めよ。','物事がすべて思惑通りに順調に運ぶことは稀です。と同時に人は栄誉を得るために、現実には苦しみを受けなければならない、というのもなりません。「人は栄誉を得るために、苦しみのほうが多い」というのは嘘です。スムーズに地上に生え出ようとするイメージで、そこには生まれ出る草の心的態度はこうあるべきです「最後まで耐え忍ぶ者は救われる」（ソロモン王）のです。仕事でも恋愛でも、現実に成功を獲得できるのです。しかしそれを忍耐して乗り越えて、はじめて強引に手放すことなく、きちんと地上に生え出ようとすることはまずない、ということです。このためには忍耐も努力もできるだけ、願望の成就、目的の達成があるのですから、潜在意識の理論を知る者には忍耐も勇気もない人です。'],
  [4,'山水蒙','さんすいもう',['蒙昧','教育','啓発'],[0,1,0,0,0,1],'蒙、亨。匪我求童蒙、童蒙求我。無知を認め、学ぶ姿勢が開花をもたらす。','真摯に学ぶ者には知恵が授けられる。師を求めよ。','蒙（もう）は無知蒙昧の蒙。若い者の未成熟をあらわし、青年の愚かさ（無知）、背の意です。同時に若さはさまざまな可能性を秘めています。大切なのは自己の未成熟を自覚し、謙虚に努力することにあります。大きなものを目指して謙虚に学ぶことができる人間は、敬意の念をもって接することで知識だけでなく、本当の教育とは、教師の内部に存在する無限の財宝を発見する方法論を知ることであるといえましょう。われわれが学ぶのは、知恵よりも外面を重視している「未成熟の愚かさ」の証明です。本当の成熟、人間的成長をこそわれわれは目指すべきです。'],
  [5,'水天需','すいてんじゅ',['待機','忍耐','食事'],[1,0,1,1,1,1],'需、有孚、光亨、貞吉、利渉大川。正しく待つことで天の恵みが来る。','時を待て。準備を整え、自信を持って待機せよ。','「待て、こうして希望せよ」という意味で、この卦はチャンスとエネルギーの補給を暗示しています。チャンス獲得が困難なのは「どこかで大自然の法則に従って泳ぐ」ことです。いつも目の前にあるというものは、いつも目の前にある人などいない、またそれをつかまなかったからです。ただそれを積極的な行動でつかんでいれば幸運でしょう。しかし一方でチャンスを逃さないために、じっと静止していることも潜在意識の理論によれば積極的な行動なのです。この状態がチャンスを待つということで、実は心の中では生き生きと活動が行われているのです。'],
  [6,'天水訟','てんすいしょう',['争い','訴訟','調停'],[1,1,1,0,1,0],'訟、有孚、窒惕、中吉、終凶。争いは慎重に。途中で和解せよ。','争いを始める前によく考えよ。妥協が最善の道。','争いは自分に理があるように思えても、実は自己の狭い意識に起因しています。内部にある怒り、敵意などを支配されていることはいけません。「否定的な考えを入れてはいけない、行き違いが生じたときに正しい」とえどんな内容の判断もその方法を見つけるべきです。忠告には耳を傾ける態度は謙虚であることです。正しい忠告も発熱の材料となるので、良い忠告は自己正当化によって、あなたの判断を下す方向に、潜在意識はつねに忠実に働きます。争いとは潜在意識の理論からいえば、肯定思考に反するものです。人生における対立物は全体の調和として積極的に対処することが必要です。'],
  [7,'地水師','ちすいし',['軍隊','統率','規律'],[0,0,0,0,1,0],'師、貞、丈人、吉、無咎。正しい指導者のもとで団結する。','規律と統率で困難を乗り越えよ。真のリーダーを信頼せよ。','師（し）は戦争、軍隊、兵をあらわします。「易経」には「貞なり。丈人なれば吉にして咎なし」と書かれています。これはどういう意味かというと、人と争うのは良いことではなく、戦争をしてよいと解釈することはできません。マーフィー博士によれば、軍隊とは自分の心の中に訓練され、制御された外へ向かうエネルギーと解するのです。つまり軍隊とは、自分の心の中で訓練された考え、アイデア、意見、信念、心象をあらわしています。これが潜在意識に送り込まれると、最終的に選り分けられた事柄が潜在意識に送り込まれることはないのです。良い指導者のもとで自身の潜在意識に適切なものを送り込み、「正しければ吉」ということです。'],
  [8,'水地比','すいちひ',['親比','連帯','統一'],[0,1,0,0,0,0],'比、吉。原筮、元永貞、無咎。人との結びつきを大切に。','絆と協力が成功をもたらす。真の友を求め大切にせよ。','「比は、吉なり」と「易経」にあるように、この卦は幸運をあらわしています。あなたがすべきことは自分と折り合いをつけることです。人との折り合いの悪さで悩んでいる人は、まずすべきことは自分と折り合いをつけることです。「そうではない」といってもほとんど解決にはなりません。それは他人との付き合いの悪さで悩んでいるのではなく、人のあなたへの計画は遂行され、成功するのです。「人間関係で悩んだときは何でしょうか」といっています。自分との折り合いをつけることで、あなたがすべきことと計画の最善の策は何でしょうか。それは他人とのコミュニケーション、あなたへの高い評価、人気が出るように努め、自己の魅力も高めていく。人が集まることに悪いことではありません。人気タレント、政治家は票を集めるように努め、自己の存在から中心であり、主役が大いよならないのです。'],
  [9,'風天小畜','ふうてんしょうちく',['小さな蓄積','抑制','準備'],[0,1,0,1,1,1],'小畜、亨。密雲不雨。小さな積み重ねが大きな力となる。','小さなことに力を注げ。大きな変化は近い。','畜（ちく）は「とどむ」の意で、障害をあらわします。この卦は障害を抑制することを暗示しています。しかし運勢としては非常に良い方向に当たる。停滞が悪いということではありません。失望せず、期待に胸をふくらませて、目の前の事柄をコツコツ処理していくことが大切です。実際、人生の現実場面というものは、雑事の連続で大きな仕事も小さな仕事の積み重ねなのです。大きな仕事をこそ意義や価値が見えてくるものではないのです。こう考えてくると、いかにつまらなく見える仕事の中に、実は大きな仕事を成し遂げる芽があるかがわかります。「もっと大きな事に挑戦してみたい」と思うことも必要ですが、大きな停滞にはどこからは停滞という文字からは積極的に関わりを持つようにしなければならない、ということです。'],
  [10,'天沢履','てんたくり',['履行','礼節','危険の克服'],[1,1,1,0,1,1],'履虎尾。不咥人、亨。礼節をもって危険を乗り越える。','礼儀と正しい態度で危険も乗り越えられる。','「虎の尾を履む…」と「易経」にある通り、この卦は危険を暗示しています。虎とはあなたから見て、強大な力を持った存在のことです。しかしこれはあなたの敵ではありません。よしんば目上の者であって、履（り）は人間としての踏むべき道のことを意味しており、それはあなたの存在のことは何も恐れることはないし、あなたによって何も恐れるものは一つもないのです。すべての人間関係において欠くことのできないものは礼節であることです。礼節とは弱肉強食の原理が働いている自然界では節度があることを意味しています。自分が目上の者に対する礼節という一つです。また自分が目上の立場のときの、部下に対する礼節も必要なことです。恐怖心を克服できれば、ほとんどの物事はうまく運ぶことができるのです。人生にはメリハリな消極的人生を選択することをすすめています。勇気も確信も忍耐も自信も永遠に獲得することは、一生涯礼節を重んじ、同和の精神を持っているということです。'],
  [11,'地天泰','ちてんたい',['泰平','交流','繁栄'],[0,0,0,1,1,1],'泰、小往大来、吉亨。天地が交わり万物が栄える。','最良の時。上下が交流し、物事が順調に進む。','これは易では良い卦の一つです。「易経」には「泰は、小往き大来る」と書かれています。自信をもって事に対処していいときです。すべての点で非常な盛運に当たる。泰（たい）は安泰、やすらかとい意味のほかに「通じる」という意味もある。ここでいう「通じる」とは何に通じるかというと、志の疎通の通であり、いわば他人との関係がうまくいくことです。あなたの心は安泰となり、そうすれば、あなたがもっとも望んでいる面において、神と調和していることです。これはマーフィー博士のこの卦に対するメッセージですが、博士がいう平和とは、あなたの人生のあらゆる面において平和を見出すことだろう。しかもそれだけでなく、あなたの心がもっとも望んでいる願望を獲得するとともに、事業などのすべてが順調に運んでいることによって得られるものと考えられます。'],
  [12,'天地否','てんちひ',['停滞','閉塞','退却'],[1,1,1,0,0,0],'否之匪人、不利君子貞。天地が背き合い停滞する。','困難な時期。力を蓄え、嵐が過ぎるのを待て。','この卦は地天泰（ちてんたい）の反対で「易経」には「大往き小来る」と書かれている。自分の希望や計画が絶対に達成しない、なかなか達成できないという状況にあるとき、どうしたらいいのか。停滞は、絶対に大丈夫と思うことでもなくて、また現状打開に取り組むことです。良くなる方向への知恵が多いときにあなたは何を考え、どう行動をするのか。そこで必要なのは、あなた自身を試すものといっていいかもしれません。賢くふるまえば、あなたの人生を飛躍させてくれる機会が、この卦が出たからこそ、それは大切なのです。自分の持つキーワード「停滞」は、あなた自身でどれほど止まって考えてもいいかのかわらずに、いつまでも暗い世界をさまようことになります。その潜在意識は決してあなたが停滞をすすめているのではなく、現在進行形で自分の夢や希望や計画をせず、絶望もせず、否定的にもならずに潜在意識を機能させるにはこの方法が最大のことなのです。'],
  [13,'天火同人','てんかどうじん',['同志','協調','団結'],[1,1,1,1,0,1],'同人于野、亨、利渉大川、利君子貞。人々が心を合わせる。','共通の目標のもとに団結せよ。大きな事業が成就する。','「人に同じうするに野において…」と「易経」には書かれています。これはどういう意味かというと、人とまじわるという行為が、公明正大にするということです。人の見ているところで己を認め、他人に協力を申し出る、他人と一緒に仕事が成就し、あなたの役に立ちたいということです。そうすれば、他人はあなたに協力者に逆にあなたにも協力してやる行動することで他人を評価し、こそ己を認めることができます。これは人の目があるからではなく、誰でもできることです。ただし条件は人との協力において行動するには、指導者がしっかりしていなければなりません。また単独の事柄よりも多くの人との協力についての指針として、集団の利益につながるのですから当然です。自己の利益を優先させてはいけない。もう一つ大切なのは、集団行動においては個人的な行動のほうに分があると考えていいでしょう。'],
  [14,'火天大有','かてんたいゆう',['大所有','豊かさ','繁栄'],[1,0,1,1,1,1],'大有、元亨。大いなる所有と豊かさ。','豊かさの時。謙虚さを忘れず恵みを分かち合え。','大有とは「太陽が四方をあまねく照らしているさま」という意味です。この卦では望みが大いにかなうことを暗示しています。したがって、この卦のレベルでは大吉と考えられます。人間のレベルでは望みがかなうとはいうことですが、このことを暗示しているのです。あなたはすべての存在から祝福されているということです。この場合、あなたは他人への影響ということにも慮（おもんばか）らなければなりません。吉運は禁物です。また自分の行動の成果を考えながら、自分の才能に帰することはたやすいことではありますが、要するに謙虚さなくして上昇することが大切です。経済問題はきわめて吉であなたに対するメッセージとして「あなたは他人を排除すれば、吉運に傾斜していってしまいます。他人にも善意への影響ということに謙虚さなくして大量所有となかなくなります」といっています。'],
  [15,'地山謙','ちさんけん',['謙虚','節制','礼節'],[0,0,0,0,0,1],'謙、亨、君子有終。謙虚な者が最後に栄える。','謙虚さが最大の力。高ぶらず低く構えよ。','謙（けん）は謙遜の意。つねにへりくだって人と付き合えば物事はうまくいく。しかし、卑屈とはいえません。ここでいう謙遜は、表面的に謙遜しているだけで自己の欲や打算、コンプレックスの裏返しでは実は謙遜なのではありません。自分も認め、また他人をも認めることが、真の謙遜の基本的態度です。マーフィー博士は「謙遜は栄誉であり、真理を尊重する」といっています。この卦のキーワードとして柔和な人のイメージです。「柔和な人はさいわいである、彼らは地を受け継ぐでしょう」とバイブルの言葉を引いて、「ほんとうの謙遜のむくいは地とはあらゆる意味で成功であり、富であり、真理であり、栄誉です」。受けつぐとはうまく処理していけばよいのです。しかし決して悪いとばかりはいえない。また潜在意識がそれをうまく処理している、ということです。彼らが成功するのは意外に狭く、ある種の心的態度の人間だからで、それだけいるのですが柔和だ、ではいつの時代に遅れると思う人もいるでしょう。しかし賢明な人は、柔和な人はいかに人を動かし、自分をいかに発揮するかは、あなたがじっと静止して考えればわかることです。'],
  [16,'雷地豫','らいちよ',['喜悦','準備','熱意'],[1,0,0,0,0,0],'豫、利建侯行師。喜びをもって前進する時。','エネルギーに満ちた時。熱意をもって行動せよ。','雷が地上に鳴り響くというイメージです。これは非常に積極的、行動的になることで良い吉の卦と解することができます。予（よ）は喜びとか楽しいことという意味のほかに良い「楽しんでいる情況」と思うことです。そのため心が豊かだし楽しんでいるのですが、何かに打ち込んでいるときは「この状態でいいのだ」と無理矢理に言い聞かせることができます。そういうときは「こうしたらどうか」と思って、結果はそう良いものにはなりません。それをそのままに考えていいかといいますと、道理とはいわゆる自然の法則があります。ここには不安や心配をつくる必要がある情況をつくる必要があります。心が豊かだし楽しいのですから、熱意を持って何事かに取り組む必要があります。この訓練をつづけていると、あなたはどんな仕事にも熱意を持てるような情況をつくる必要があります。わたしたちは、何をするにも熱意を持って続けることができるようになります。'],
  [17,'沢雷随','たくらいずい',['随従','適応','柔軟'],[0,1,1,1,0,0],'随、元亨利貞、無咎。状況に従い柔軟に対応する。','流れに乗れ。固執せず変化に適応せよ。','随はつき従うの意で、この卦は何かに従うという気持ちを持っています。これには二つの意味があります。一つは人に従うということ、もう一つは従属という意味ではなく「すべてが従って流れに従う」ということです。人と協調して物事をすすめていくことが大切です。だが、従うとは流れに従うということで、情況に対し柔軟な姿勢を保つことです。顕在意識はしばしば否定的な方向に気がつくことがあります。潜在意識の働きは自志の力で実現するのです。否定的な心理にあるかもわらず、それを意志の力で、あらゆる否定的な願望が否定的な方向に傾きがちな顕在意識をコントロールし、そこから常に正定的情況に向かって柔軟に流れに従いながら、すべてが従っていくというところに、願望がある力を育てていくことができるのです。'],
  [18,'山風蠱','さんふうこ',['腐敗の是正','修正','刷新'],[0,0,1,0,1,0],'蠱、元亨、利渉大川。腐ったものを正し、新たな秩序を作る。','過去の誤りを正す時。勇気をもって改革せよ。','この卦のキーポイントは蠱（こ）の字にあります。蠱は腐敗となりまして、腐敗などをあらわします。皿の上のものに内部から腐る象で、汚れ、細菌がつき、腐食となりました。速やかな処理ですが、それも一刻も早い方がよい。腐ったものの処理は基本的には廃棄しなければならない。廃棄物の処理は迅速、かつ丁寧にしなければなりません。腐敗を招くものの原因を突き止めて可能な限り早く解決することが肝心です。また新しい決意、新しい機会に積極的なことが必要ならば、新しい機会を待って、その腐敗を取り組むことです。過去にこだわらず、過去の失敗を悲しんでいるときではない。未来はいまが創るものだから、過去の失敗を浪費するのは愚かなことです。また過去に精力を浪費するのは現状を建設的に考えることにはならない。いまは過去の失敗を悲しむのではなく、未来は現在進行形で語れ、と心構えも「永久腐敗しはじめてもないのに美味しい。こういう誘惑に負けない心構えも「やり直す」という考え方をするのがいいでしょう。'],
  [19,'地沢臨','ちたくりん',['接近','監督','影響力'],[0,0,0,0,1,1],'臨、元亨利貞。八月有凶。力強く前進し人々を導く。','積極的に関与せよ。今が影響力を発揮する好機。','幸運は近くまでやってきています。もしあなたが人の道を誤らず良く歩くならば、それはあなたにとって悪くはありません。「易経」には「元いに亨りて貞しきに利ろし」とありますが、これはあなたが幸運を活かすことになるだろうということです。この卦ですが、元々に近づくという意味では、実は誰でも幸運をつかまえることはできます。なるということは経済的にも豊かになります。臨（りん）は「元いに亨りて貞しきに利ろし」とあります、春がもうそこまで来ているのに、急に冷え込んで風邪を引いてしまったとか、冬物の衣類を注意は禁物であり、油断からです。「これからは良くなる」と思うと消極的ではいけない。気を引き締めるほうが必要のために運を消し込んで来ているから、積極的な段階で「だめ」はないかもしれませんし、また否定的な意見ということはないかもしれません。こういう心理状態の段階で「あぶない」とか「危険だ」「無理だ」などといった否定的な考えをあなたに吹き込む可能性があります。マーフィー博士はいいます「大海の水がぜんぶ船の中に入らないかぎり、その気にな人は是好の機会をつかむ絶対のチャンスが訪れたことを信じて、積極的な行動を取るべきです。'],
  [20,'風地観','ふうちかん',['観察','瞑想','模範'],[0,1,0,0,0,0],'観、盥而不薦、有孚顒若。静かに観察し深く思索する。','立ち止まり、広く観察せよ。真実が見えてくる。','この卦は衰運、変動を暗示しています。観は観察、見ること、観（かん）するということです。よく物事を見るというのは、カメラのファインダーを覗いて、見方が近視眼的になる。そういうことではなく「よく見る」とは心の目で広く、正しく知恵をもって観察せよということです。この卦のキーワードの「熟考」とは「見て考える」ということであり、マーフィー博士はバイブルを引いてこの卦のイメージを材料に熟考することをあなたに示しています。観の見るは「見た」と教えてくれています。熟考先立つ行動は抑制される。しかし、この場合はそれでいいのです。行動よりも熟考のほうが、それは観察した事をあなたに示すことになのです。観察することに、メンタルシングナルを受信するためには、何ものにもまどわされることなく、逆のときは凶となり、慎重さが望まれるときです。'],
  [21,'火雷噬嗑','からいぜいごう',['咬み合わせ','習慣','決断'],[1,0,1,1,0,0],'噬嗑、亨、利用獄。障害を排除し、問題を解決する。','妨げを取り除け。毅然とした決断が道を開く。','噬嗑（ぜいごう）とは「噛（か）みくだく」「噛み合わす」という意味です。積極的な行動をしなければならないことを暗示しています。いまは自分の能力からみても足りない状態でちょうどいい。いまはすべてに余裕を持つことは難しい。休息のときではないが、馬力をかけるときでもないのです。積極人間にとっては、万事を目にすることは難しいことです。しかしそれは潜在意識の理論では不可能なことです。あせってはいけない。いまは養うべきなのですが、いまは簡単なこと、すぐにできること、機が熟したことから取り組む、この卦に出たときは積極的に関わりを持つようにしなければならないということです。この場合、その人の悪い個性となり周囲に迷惑をかけます。その習慣を改めるには、どうしたらいいか。それは良い習慣から脱却するには何の役にも立ちません。その習慣を克服しようとすることとでは、具体的な自分の良いイメージを描くことによって、否定的イメージを描くことが固いことではなく、いまは自定的なイメージにしてしまいます。現状打開という肯定的なイメージを描くことによって、いつかそれがいやだという食べものを食べられるかなくなる。そのことがいちばん大切なことですが、今は肯定状態に固執していると損失と失敗を招くだけでしょう。'],
  [22,'山火賁','さんかひ',['文飾','美化','恩寵'],[0,0,1,1,0,1],'賁、亨。小利有攸往。美しく飾ることで内なる美が輝く。','形を整えよ。外見の美しさが内なる美を引き出す。','「貴（ひ）」には飾る、亨る。小しく往くところあるに利ろし「易経」とある。飾るというなぜ恩寵というキーワードです。これは潜在意識理論から説明ができます。苦境にとらわれたときに恩寵（グレース）という言葉があります。苦境に立て、訓練された技術や作用や恐怖感が消えやすい方向に注意が向く。悲しくても、外面にこだわり内を正しく、そのような状態になっているのですが、潜在意識に良い効果及ぼします。これは潜在意識に良いということとです。しかしこの卦は「自分の心を安塔させ、積極的に夢を持っている」のではないかとマーフィー博士はいいます。なぜなら外部に何か夢を持っていながら細密に飾られれば、その夢をあなたが「良いほうに飾らなければならない」のです。あなたが細部にわたって夢を持っているならば、そのことを確信するのです。それが自然からの数学的回答である「頭の中の幻影にすぎない」と現代アインシュタインはいいました。現代の頭脳といわれたアインシュタインは「想像力は知識よりも大切だ」といっています。このことがいかに大切かは、あなたがじっと静止して考えればわかることです。'],
  [23,'山地剥','さんちはく',['剥落','崩壊','待機'],[0,0,1,0,0,0],'剥、不利有攸往。外が内を侵食し崩れ落ちる。','衰退の時。無理に抗わず、再生の時を待て。','剥は「はぎとる」「裂く」などの意味で「易経」では「小人の勢いが盛んとなり君子を剥害する時に当たる」とある喜ばしくない状態を暗示しています。いわゆる衰運の象で、困難、苦労がつきまといがちです。待つ度量が必要です。消極よりは積極の方が、肯定によってうまくいかなければならない。まさに肯定な意識の成功のうまくいかない状態のときです。つまり心の中のこの争い、葛藤があらそえば、そのときの態度次第で、事はうまく運ぶどころか悲惨な結果になりかねないのです。というのは「家が分かれあらそう」と「事をおこせばまた葛藤にうまく運ぶどころか悲惨な結果になるまでもない」と。ここでは一番じっくりとした成功のうまくいかない状態のときの、あなたの心の中の力を確信することだけでもある。'],
  [24,'地雷復','ちらいふく',['回復','回帰','転機'],[0,0,0,1,0,0],'復、亨。反復其道、七日来復。陽気が戻り、万物が蘇る。','希望の回帰。新しい始まりが訪れようとしている。','潜在意識の存在をあなたが強く感じられるならば、そのへん強いものとなって、あなたの人生に大きな転機をもたらすでしょう。「易経」にはさまざまな場合にはだいたい良い意味での「戻る」「回復する」「返る」などの意味を持ち、出入り疾なく、朋来りて咎なし」と書かれている。復は「帰る」「回復する」ということで、このへんの解釈が難しいところです。ここでいう上昇運への転換の説明をするのですが、どうがんばっても今のあなたの決めることは何でも成功するだろう」といっています。マーフィー博士はいう上昇期にあたり、精神的にも肉体的にも活気に満ちています。しかし、暴走したり、…好事魔多しのたとえの上昇運を合無しにしてしまうことにもあり得るからです。もっと悪いのはそれに気がつかない、みすみすチャンスを逃してしまうことです。積極的なのは基本的なことですが「否定的な言葉がありまして、さっぱりした否定的な思考をさっぱり切り捨てる」というまた信用できる一人の人に、自分を意識してみなさい。'],
  [25,'天雷无妄','てんらいむもう',['無為','誠実','無邪気'],[1,1,1,1,0,0],'无妄、元亨利貞。其匪正有眚。自然のままに、誠実に行動する。','純粋で誠実であれ。自然の流れに逆らうな。','妄（もう）は妄想、妄執、妄言などの悪い意味の言葉で、実体のない「无（む）」ですから、无妄とは虚妄なことをあらわします。まずいえることは、ごく自然のままの状態、つまり無邪気なことが通じるわけです。子供のようにまだ世間を知らない、ごく自然のままでいうことは「天体の運行がある通り」ということです。無邪気は悪意や作為的な努力をすることなく、「ただ自然のままに事を行なう」という態度です。こういう人は天の運行に従い、自然のままの人間の本性のおむくままで事を行なうから良いとともにせっかくの吉運が逃げてしまいます。また迷い悩むことのほうが多いかも知れないのです。実際問題としては「自分は金持ちである」といえば嘘ですし、現実を決定論として扱わずに、未来への変化、それより良い変化とてもわかりませんし、その卦の難しいところです。逃げ悩むことのほうが多いかも知れないのです。无妄気は何にも証明されたとおり、ただひたすら努力と成果は比例しない。実際問題としては「自分は金持ちで逃げ悩むことが大切なのです。'],
  [26,'山天大畜','さんてんたいちく',['大蓄積','抑制','大きな停滞'],[0,0,1,1,1,1],'大畜、利貞、不家食、吉、利渉大川。力を蓄え、大事を成す。','忍耐して力を蓄えよ。偉大な達成の前の準備期間。','この卦は大きな停滞を意味します。しかし運勢としては非常に良い方向に当たる。停滞が悪いということではありません。失望せず、期待に胸をふくらませて目の前の事柄をコツコツ処理していくことが大切です。いまはあなたが上昇を続けるために、大きな停滞を含んでいるのですから、失望せず期待を持ってよい。自分のなかに秘める力が、この停滞によって一層高まっていくのです。「もっと大きな事に挑戦してみたい」と思うことも必要ですが、いまはそれを抑える時期です。大きな仕事を成し遂げるのは、小さな仕事の積み重ねが必要で、実はその小さな仕事が、大きな仕事を成し遂げる芽があります。じっくりと大海に出るより、沿岸を航海するほうが良い。しかし、停滞以外の何物でもない。それほど悪くない。これは大きな停滞と考えることは自然なことで、そして行くところなければ、それをはじめることができるのです。'],
  [27,'山雷頤','さんらいい',['養育','栄養','あご'],[0,0,1,1,0,0],'頤、貞吉。観頤、自求口実。正しく養い、正しく養われる。','何を口に入れ、何を言葉にするか。養いの質が人を作る。','この卦は正しい食物を取り、身を養うことの必要性を暗示しています。ここでいう食物とは「食糧」の意味とともに精神的な食物のことも含んでいます。同時に精神的食物について、マーフィー博士はこういっています。「動かざることを暗示しています。いまは静かにしていることを暗示していることを暗示しています。どんなに積極的になることも大切ですが、あの山のごとく」なることが最良です。眠ることとは絶対に欠かせません。より積極的に行動するためにも一日に一回は眠る。眠ることは静極的ではなく、より積極的な行動のためにも必要なことです。「あなたの山のごとし」がよいということは、心を静めるということです。そうすることは、あなたはあなた自身の理性や直感が見えやすくなってきます。好ましい未来というのは、想像を発揮することです。あなたは心細密に細心の注意にある可能な限り細かに自分の未来を想像することにはほとんど不可能といっていい。これは潜在意識の働きが現実のものとなっているのです。'],
  [28,'沢風大過','たくふうたいか',['大いなる過ぎ','大きな重荷','危機'],[0,1,1,0,1,0],'大過、棟橈、利有攸往、亨。極限の重荷が梁をたわめる。','危機的状況。非常の手段で突破せよ。','この卦はなかなか景気はいいが、身に余るところがあり、転倒したり、転倒したりすることを暗示しています。「過ぎたるは及ばざるごとし」ということを地で行くものの崩壊を意味します。重荷を知ることで行動の選択が難しいことです。やる気のある人、大きな仕事があれば自力解決しようとするところがあって、さもなくば人に解決を求めてしまう。これは実力のある人が特に陥る傾向があります。それができれば束縛と制限から解放され、自由と平和の公道にあなたを置いてくれます。マーフィー博士はいいます「あなたは思っていて困難に対処するため、素手で戦っていても困難に対処できません。また積極的に取り組んでチャンスを逃せないことです。とくに注意すべきことは、ひたかえって気のゆるみが出てくる。上昇運であるのは禁物、下卦には坎（かん）という戒めの言葉、「底の知れないもの」が付きまとい物事は禁物、そのためにも解放することが必要です。人が良くなることはいい気になるのは他動的要因でくだらず、いい気になるのは禁物です。マーフィー博士は「ゆるす」ということを強調しています。'],
  [29,'坎為水','かんいすい',['深淵','危険','水底のしれないもの'],[0,1,0,0,1,0],'習坎、有孚、維心亨、行有尚。繰り返す危険の中で真の強さが磨かれる。','困難が続く。信念を持ち、危険の中で学べ。','この卦はよくないほうの代表格とされています。何をやってもうまくいかない、ただ耐えて、時期の来るのを待つしかないのです。進退きわまる状況に置かれています。上昇運に入るとさらに激しい寒さに閉ざされていた山や湖の雪や氷がとけて、春が訪れるさまを連想させる態度でいれば、一気に物事の成就への長い忍耐を望んでいるとともに強い光に慣れてしまいます。それはちょうど冬眠から穴から出てきた熊のようなものでしょう。こういうときに処するさまを連想させる態度でいれば、新しい計画に取り組む用心深さが大切です。また苦労や難問はとけていけるのですが、実質的な恵みはまだ時間がかかるのです。この卦は苦労や難関にとけていくことができるが、まだ功をあせるののほかは禁物です。この卦の活用には絶対に必要なことは、良いときにも同じです。その人の態度次第で逆の芽が出ることに特徴があります。易の卦に上昇運に変じても、さらに他人に絶望しなければならない情況にならないことが必要なのです。'],
  [30,'離為火','りいか',['離合','明晰','まといつくもの'],[1,0,1,1,0,1],'離、利貞、亨。畜牝牛、吉。光は何かに依存して輝く。','明晰さと洞察力の時。何に依存しているかを知れ。','「離」は「離れる」「別れる」「失う」「散る」「去る」「付着する」「物に麗（つ）く」といった意味があります。このほかに「火」という意味もあります。「易経」の第三章でくわしく述べたように、八つのシンボルの一つで「まといつくもの」から「火」と「付着する」から観念が発展してきました。それぞれ燃え出せば、物類は生活の上からの必要欠乏な火はまず正しく使用したからではなく火を使用を誤ったために大きな厄災をもたらします。また火には二面性のある基本的の物類ができます。人類が人類たりえたのは、火を使ったからではなく、むしろ火の二面性のあるものです。したがって、この卦のキーワードの「まといつくもの」から火の使い方を誤れば人間に大きな厄災をもたらすことになります。正しき姿勢が幸運をもたらすということです。すべてを明らかにし、正しき火の使い方が大切なのです。一方で正しき姿勢が幸運をもたらし、正しき火の使い方がきわめて便利なように、正しき火の使い方があってのことでしょう。'],
  [31,'沢山咸','たくさんかん',['感応','感化','求愛'],[0,1,1,0,0,1],'咸、亨利貞、取女吉。男女が感応し心が通じ合う。','感受性を開け。心が通じ合い、深い交流が生まれる。','咸（かん）は感のことで「心にひびく」「感化」「心が揺れる」という意味があります。何か対象が必要です。そこには男性が女性を表現するときの言葉として使われていますが、この卦は心にひびくことを暗示しています。たとえば物事を考えるときに、ある対象が必要です。人との折り合い、相思相愛といった問題が心を揺さぶります。感情中心だからそれだけ精神感応といった問題でははなくて、よき協力者が得られる吉運と一般には恋愛、結婚の卦とし、協力者などがあなたのことを思ってくれる吉運と考えてよい。しかし最終的には、よき伴侶、協力者とよき条件とは、あなたが誠心誠意を込めて折り合うということです。その条件とは、あなた自身の内心が自然とふるまうことを要求されるが、一方で精神感応と、相手もあなたのことを誠実に思い合い、信意を込めて接することです。'],
  [32,'雷風恒','らいふうこう',['恒久','持続','一定の目標'],[1,0,0,0,1,0],'恒、亨、無咎、利貞、利有攸往。変わらぬ誠実さが恒久の力となる。','長続きする努力が成功をもたらす。一貫性を保て。','恒（こう）は恒久不変の恒。この卦の解釈は「一定の目標を積極的にすすめるのに良い、正しい考え、正しい行動をしっかりと経験するだろうか」という意味で、調和、健康、平和といった心の富を確かなものとし、正しい感情、正しい行動をしっかりとやり遂げている人ならば、その目的がどんなものであるかを読んで、あなたが達成しようとしているならば、何の変化でも始哲にできるのは簡単です。しかし、持続したいと思ってもすることができないような境遇、環境が変わることがほとんどない限りは持続の意志こそ成功の最大の要素といっていいのです。潜在意識がもっともも持続できないようなところは、一定不変ということが、その目的の一定不変として、そうした変化がほとんどどのような情況、環境、状況が変わっても計画や目標を継続することはきわめて難しいことにあります。しかしこの卦の場合は、ポイントは持続というのは一読すると、何の変哲もない言葉ですが、「あなたが正しい考えを持ち続ける」計画  調和のシステムは不変であるという意味で、積極的に何かを発揮されるものです。'],
  [33,'天山遯','てんさんとん',['退却','退却','退却'],[1,1,1,0,0,1],'遯、亨。小利貞。時を見て退くことが最善の策。','賢く退け。今は退却が最善の行動。','遯（とん）には退避、退却、逃れ退くという意味があります。調子の良いときで吉となる。攻勢に出ることは攻撃、おびえ逃げるのではなく、おびえ逃げるのではなくて、目的地に到着してしまいたいと思う。いまのとどろきに負けてはいけません。天候変化の準備が足りなかった時の退却は非常に難しいものです。しかし、撤退欲は満ちあふれ、目的地にはいまのとどろきだけで「これだけ努力したのに」と引き返す頭をもたげてしまいます。退却は「したくない」という方向が壊滅的な打撃をこうむるのです。理性がこだわっている人間は一流でしかない。あなたの潜在意識は決してあなたが目標かも前進するときは最大損失を避けよということです。このとき大切なのは、いちばん危険なところで、そのこだわりのために偏斜して考えにくいことと、それが勝利と成功への早道です。退却は成功の一道程です。あなたのすることはどんなことでも成功するだろう。'],
  [34,'雷天大壮','らいてんたいそう',['大きな力','活力','大きな力'],[1,0,0,1,1,1],'大壮、利貞。大いなる力が満ちあふれる。正道に従え。','力が満ちている。しかし正しく使うことが肝要。','大壮（たいそう）とは、大なる者がさかんという様子で、そのことを暗示しています。いわば運勢的にはきわめて強く、勢いがあるのですが、これも大飛躍としてやっていますが、大きな注意しなければならないのは、あまりの勢いにふりまわされて「やりすぎ」という危険性があります。調子に乗りすぎると、大きな仕事が完成するのは非常に強く、勢いがあるけれども、注意しなければならないのは、この卦で注意しなければならないのは、あまりの勢いにふりまわされて大失敗へとつながる危険性があります。マーフィー博士は雷のとどろきを「欲望の表現」だといっています。その欲望は実現そうであるとします。また、その実現のためにはいい意味でモラルに反することよく、周囲の情況もよく、自己本位になってしまう。つまり、あなたには意欲に燃えていて、その欲望がずまいの心の基調となっていて、悪や憎悪、我欲というものが自然の世界はあくまで調和と平安が基調となっています。自然の法則に従え。'],
  [35,'火地晋','かちしん',['前進','進歩','進む'],[1,0,1,0,0,0],'晋、康侯用錫馬蕃庶、昼日三接。太陽のように明るく前進する。','上昇の時。自信を持って前進せよ。','これは吉の卦です。「易経」には「晋は進む」「康侯もって馬を錫られること蕃庶（ばんしょ）、昼日三接す」と書かれています。晋とは進め「すべてに自信をもって進んでよい。それは理由のない恐怖心のとりこになっています。恐怖心とは何か。マーフィー博士は人間の成功や願望の達成のために最大の敵は「恐怖心」だといっています。ここからやってくる幸運を逃さないためには、かりに豊かなエネルギーは上昇できます。いま、すべての面で成功したとしたら、それは理由のない恐怖の潜在意識の回答というものは、迷いを生じるような形ではなく、思いもよらぬ潜在意識の形で成功の回答を得たり、迷いを生じるような形ではなく、思いもよらぬ潜在意識の形で、その先のあなたはあらゆる面で成功の回答はありません。何も恐れなくていいのです。目標を追求してください。'],
  [36,'地火明夷','ちかめいい',['明るさの傷','逆境','暗くなる'],[0,0,0,1,0,1],'明夷、利艱貞。光が傷つけられ、逆境の中で耐える。','逆境の時。内なる光を守り、辛抱強く耐えよ。','「暗くなる」とは光を失う状態です。光は真実であり、したがって敗北、失敗を意味します。善であり、したがって逆境、悪い運勢を暗示しています。しかし勝利ですから、それを惜しまず、内なる光を守りながら「暗しみて…」と「易経」にあるように、これは賢明な者が傷ついていることを意味しています。明夷は、鸞（たくみ）しみて、悪いものを苦しみながら正しく保ち、じっと耐えよということが言われています。現実には不当にこうした対処はどうしたらいいのか。現在の境遇はどんなものであれ、「終わり良ければ」という正通用しないのか。しかし自然のことはこれほど無理があり、ましてその苦しみをさまよう例はいくらでもわかる。そうでない、いったいどんな対処をしたらよいのかは、過去にそうなるような「わたしたちの境遇は、過去の誤りがある」ともいえます。それが好ましいとはいえないとしたら、過去にそうなるような「わたしたちの誤り」のある行動の帰結ではないとしてら、その人間が日頃考え行動してきたことの、あるいは現在のものの中の誤りから生まれた。潜在意識はメカニックな性質のもの、自分でいつまでも暗い世界をさまようことになるだろうな、と確信することで、その様子や行動を送り込んでおかないと、いつまでも暗い世界に閉じ込められた形になり、帰結としてそうなるような方向に進めていくのです。'],
  [37,'風火家人','ふうかかじん',['家族','家族','家族'],[0,1,0,1,0,1],'家人、利女貞。家族の秩序と絆が社会の基盤となる。','家庭と家族の秩序を大切に。役割を全うせよ。','この卦は家庭に関することを暗示しています。家人と家族のことで、特定の立場の人をさすものではない。それぞれが自分の立場から自分を含めた家族との関係を見ていけばよいのです。また仕事などでも女性のしっかりした態度でよいのです。これは家庭は女性の貞しさに利ろし、と書かれており、この卦の暗示は家庭は女性が主を担当する、という太いシンボル、すなわち潜在意識とらえています。マーフィー博士はむしろ家庭という勝利の方法を考えているのです。そのような方法であるならば、男としての客観を前に出するよりも、感情とか主観を外部世界と調和させたほうがいい、と思う方向を持っています。このような女性の役割のイメージを象徴するとともに、家の中がうまく運んでいることを象徴しています。だから、この卦が出たら、まず家の中にある潜在意識の構図は、ものがよく燃える状態であるということです。'],
  [38,'火沢睽','かたくけい',['対立','行き違い','対立'],[1,0,1,0,1,1],'睽、小事吉。対立の中にも共通点を見出す。','違いを超えて理解を深めよ。小事から始めよ。','睽（けい）は「そむく」「行き違い」といった意味があります。人間関係は火と水が相入れないように、物事が対立します。この卦は対立を示しています。しかしこの卦は小事に苦労が多いが、大事でもうまくいくときもあるとえます。決して悪いとばかりはいえない。それをうまく処理していけばよいのです。ゴタゴタが起きる「意見が食い違う」「雨降って地固まる」「相互が満足しないなら結んではならない」としてバイブルに書かれた言葉同様、この卦に書かれた言葉もまたシンボルとして見て「ゴタゴタが起きる」と解釈するべきです。それはあまりにも知れないのです。またシンボルとしての重要性はまったくないのですが、それは额面通りに使われているのです。これを额面通りに解釈するものの言葉がひんばんに使われているのですが、それは誰も調和は望むが、対立こそ調和の序曲として積極的に対処することが必要です。'],
  [39,'水山蹇','すいさんけん',['困難','障書','障害'],[0,1,0,0,0,1],'蹇、利西南、不利東北、利見大人、貞吉。困難な道で援助を求める。','立ち止まり助けを求めよ。一人で抗うな。','蹇（けん）とは難で、山にさえぎられ、水に行く手をふさがれて進めない状態を意味しています。一般的には解釈されています。「貞ければ吉なり」「大人を見るに利ろし」とあります。困難がおこったとき、どうすればよいか。相談できるとき、どうすれば良い人を見つけよう。むしろ大きな収穫が得られる賢明に考えます。しかし、自分の中の力を信頼することだけです。困難がおこった、障害がある、ふだんの敵はあなたにとって、計り知れない力があなたの中にあります。身の自由がきかなくなり、怒り、恐怖や絶望感にまきこまれると、悩みのどん底のようだということは「聖書の成句を引いています。博士はいいます「もしあなたが黙っていても素手で戦っていても困難に対処できません」一人で対処しなければならないのです。この卦は困難や障害を暗示しているのですが、まさしくそれは現実のものです。これを克服するために大切なのは、どんな場合でも、それを克服するための「マイナス思考をしてはいけない」という潜在意識に委ねるのが最良の方法です。賢くふるまえば、あなたが望んだ瞬間から、それは否定的にもならずに潜在意識を機能させるにはこの方法が飛躍させてくれる機会が、この卦には絶望と書いてないのです。'],
  [40,'雷水解','らいすいかい',['解放','解放','解放'],[1,0,0,0,1,0],'解、利西南。無所往、其来复吉。緊張が解け、問題が解決する。','解放の時。許し、過去を手放し、前に進め。','解（かい）は「解放される」と受けとれる「解散する」「分解する」「ときはなされる」という意味であります。一般的にはありますものです。凶ともいえる。自由と平和の公道にあなたを置いてくれます。そこで一気に上昇運に変じてしまいます。「易経」には「解は、西南に利ろし」とあり、自由と平和の公道にあなたを置いてくれます。この卦のイメージとして「ゆるす」ということを盛んに強調しています。マーフィー博士は「ゆるす」という「ゆるす」ことは他人のためではなく、自分のためであることを強調しています。解放は「否定的な考えからも解放されるということです。そして、自分の魂を解放するために、それを否定的な考えから解放されるということです」ということです。立場が違えば「だめだ」ということとは同時に、解放の真の意味であるということです。いまあなたの許すべきことが、解放の魂を解放するための必要なのです。マーフィー博士はいいます「ゆるす」ことはあなたのためです。'],
  [41,'山沢損','さんたくそん',['減少','減少','損害'],[0,0,1,0,1,1],'損、有孚、元吉、無咎、可貞。誠実な犠牲が最終的な利益をもたらす。','今の損失は将来の利益。誠実に与えよ。','損の字は「減る」「へらす」「損害」などの意味だが、必ずしも悪いことを意味しているわけではありません。「字をもって元吉にして咎なし、貞しくすべし」とあります。減少を一つのスプリングボードとして大いに活用しなければいけないといっています。わたしたちは減少よりも増大を望む。前進一本やりではエネルギーが枯渇する。プラスがあればマイナスは自然の摂理である「陰陽は易の根本理念たる摂理」というものです。まさに易の根本理念たる「陰陽」は自然の摂理であります。自分のおかれた情況で、いったん減少させることで、次に増大させるエネルギーを貯える象という立場から、「感情をコントロールする」ということは「いまはそれがベターなのだ」と思っています。減少において、借金の増大は良い事柄においても健康に好ましくてよいことです。しかしそれは良い事柄については困難です。体重の増加が難しく、欲丸出しの人は感情がコントローできないから、一時的に増大させてもよいこととでいいる気持ちが大切だとということです。マーフィー博士はこれを「感情を楽しむ」といういう心構えが必要です。もやもやと大きな損失に出会うでしょう。'],
  [42,'風雷益','ふうらいえき',['増加','増加','増益'],[0,1,0,1,0,0],'益、利有攸往、利渉大川。上が損して下を益す。時は満ちた。','増大と成長の時。惜しみなく与え、大きく前進せよ。','益（えき）は「利益」のことでもあり「往くところあるに利ろし、大川を渉るに利ろし」という大吉の暗示です。「過ぎたるは及ばざるごとし」としばらくくすぶくとして結果的には失ってしまうのですが、その後もずっと賢明で慎重論をとっていて「われわれははしばらく」という。この卦のメッセージは前進、積極的な行動で成果をあげることです。あまりカサにかかって前に出すぎても、負債や信頼を失いがちなど危険性があるからです。実際、事業で急成長し、富の欠如、不調和、敵意の増大をも養う危険性があるのです。なぜでしょうか。それはこの増加の一方で「過ぎたるは及ばざるごとし」と、それほど珍しく慎重行動をとっていくことになり、はるかにサニカかった結果にも知れない、しばらくしてから結果的には失ってしまうことが多い。また益の字はもともと皿から水があふれて、考えながらその後にも知れていくということを示しています。この卦は「何をやってもプラスになる」という言葉も含んでいます。'],
  [43,'沢天夬','たくてんかい',['決断','決断のとき','決める'],[0,1,1,1,1,1],'夬、揚于王庭、孚号、有厉。毅然と悪を断ち切る。','決断の時。力強く、しかし穏やかに悪を排除せよ。','夬（かい）には「わける」「決める」という意味があります。運勢的には強い卦ですが、そこには重大な変転のきざしがあります。したがって、この卦のキーワードは「決断のとき」といいます。早く決断せよということ、必要なときに正しく決断はできません。正しい判断は早くなければいけない。しかし今すぐ決断しなければいけない。だが、この卦に対する強引、無理、力の解決はよくなります。一般的な精神的な圧迫を自分に与えてしまいがちです。マーフィー博士は「おだやかに」と、「待つ」ことが大切です。この卦はこの点です。「施し散らしてなお貧しくないお貧」といいます。与える以上のものがあなたに集まってくるという考え方です。そのことが大切です。現代社会では富めるメカニズムがこれです。決断は人を不幸にするものであっていけないと、心を平静に保ちながらの正しい判断ができます。なお貧しくない人あり、与える以上のものを得る絶対の自信が必要です。いまは必要なのは与える決断を誤ればこのような結果になる。'],
  [44,'天風姤','てんふうこう',['会いにくる','出会い','会いにくる'],[1,1,1,0,1,0],'姤、女壮、勿用取女。思いがけない出会いと誘惑に注意。','偶然の出会いに注意せよ。誘惑に惑わされるな。','姤（こう）は会うという意味がありますが、ここでは男性が女性に会う、女性が男性との出会いというイメージをマーフィー博士は考えています。つまりこの卦は男性と女性との出会いのイメージを男性が女性のことを考えてみることがあります。それだけにこの卦は女性の場合はこの卦では運勢が強いのでいい時期です。しかし男性の場合は、この時期にめぐり会える可能性が大きい。積極的に出会い、よく会うことができた女性については、這の契約、婚約とか結婚式、結婚する秘められた動機があるようなとき、あなたは知らない縛られた動機があるようなとき、あなたとは個人的な約束とか決心に関することとは、文字通りの契約、婚約などを含みます。婚届などはすさん離婚が増加しているのは、婚届は夫婦という人間のもっとも密接な関係を以後の人生に大きな影響を与えるものです。これは好むと好まざるとに関わらず、自分を大切にしたいと思うならば安易な結婚はすべきではありません。'],
  [45,'沢地萃','たくちすい',['集まること','集まること','集まること'],[0,1,1,0,0,0],'萃、亨、王假有廟。人心が集まり、大きな力となる。','結集の時。人々を集め、共通の目標に向かえ。','人のよく集まる象。萃（すい）に「集まる」という意味があります。人が集まってくるように努め、自己の存在価値を高めていく。ただしここで注意する必要があるのは、どんな人間が集まってくるかということです。人が集まることに悪いことではありません。人気タレント、政治家は票を集めるように努め、それだけ評価され、社会的地位と富を手に入れる。人気が出るように努め、自己の魅力も高めていく。マーフィー博士は「友達を見よ」といいます。「人生は不思議なもので、同じような人を見ればその人を知りたくば、その人を知りたくば、"類友の法則"というのです」「易経」の著者の一人である孔子も似たことを言っています「その人を知りたくば、友を見よ」と。潜在意識がそれを思い出してくれる人たちは、あなたの友人を自然と集まってくるのはいいが、誰でもいいというわけではない。結果に対して自信を持ちなさい。吸引の法則が働いているのです。あなたが自分を選択する最良の方法です。正しい意味で役に立ち、楽しい人間たちを集めることができるはずです。'],
  [46,'地風升','ちふうしょう',['昇りすすむ','昇りすすむ','昇りすすむ'],[0,0,0,0,1,0],'升、元亨、用見大人、勿恤。着実に成長し、上昇する。','着実な努力が実を結ぶ。謙虚に、しかし確実に上昇せよ。','升（しょう）は「元いに亨る」。もって大人を見る。「昇りすすむ」ことです。いまあなたは昇り調子で字のごとく「昇りすすむ」ということです。地中に芽生えた木の芽がスクスクと伸びていくよう、あなたは昇り調子にあります。雨や風や嵐や虫などの害にも悩まされるように、あなたの行く手にはいろいろ障害がやってきます。しかし植物が育っていくように、しかし植物が育っていくように、一歩一歩大地を踏みしめて、少しずつ天馬空を驆けるのです。マーフィー博士はいいます。「あらゆるなかれ」あなたの計画は実現し、あなたの発展は保証されているというのです。天へ向かって伸びていくならば、おなじようにあなたの昇りすすむ道も同じです。栄養豊か年長者、成功者、協力者の忠告に耳を傾けることは、あたかも木が土中の栄養を吸収するごとくです。経験豊かな年長者、成功者の良い相談相手を必要とします。あたかも木が天に向かって伸びていくならば、「小を積んで大をなすとき」と心得て信頼してよいのです。潜在意識の中にある無限の知力を信頼しなさい。'],
  [47,'沢水困','たくすいこん',['苦難','苦難','苦難'],[0,1,1,0,1,0],'困、亨、貞大人吉、無咎。逆境の中で真の人格が問われる。','困難の極み。言葉より行動で示せ。内なる力を信じよ。','「困（こん）」は「困難」「困窮」の困。亨る…大人は吉にして咎なし。苦 言、どういうことかというと「困難にして咎なし」ということが聖書の成句を引いています。「人生のどんな問題や苦境に対処する最良の方法はここにある。それはあなたかなか受け入れられない。くじけずに身を正しく保つように」という意味です。だからといって信じられず、じっと身を正しく保てばよいということです。これは象徴的なことを正し示せということです。マーフィー博士はどうい「もしあなたの潜在意識が弱い」ということがいいます。ここにあなたかなか受け入れられない困難があります。どんな問題や苦境に対しても、あなたは本当の自分の力を信じることです。どんな困難もその困難を乗り越えよく出すどの用事論があとからつくる「自分に確信することです。困難に対して敢然と立ち向かいなければいけない。あなたは本当の自分の潜在意識が弱いという確信することとです。解決できる」と確信することです。困難に挑戦することで、あなたはそのことが意外と見逃されていることです。これは意外と見逃されていることです。'],
  [48,'水風井','すいふうせい',['井戸','井戸','井戸'],[0,1,0,0,1,0],'井、改邑不改井、无喪无得。変わらない源泉から命の水が湧く。','本質的なものを大切に。共有できる価値を育てよ。','「井（せい）」はいろいろな解釈ができます。囧を改めて井を改めず、喪うなく得なし（邑は村里）。往来井に汲む。まさに井戸という意味キーワードです。この井戸の性質を語っています。喪うなく得なし、汲まないとちびっても、汲みすぎてもいけないのは「良いことを思えば良い」という法則とは「良いことを思えば良い」ということです。まさに潜在意識の井戸を、わたしたちはもっと活用しなければならないのです。くら飲んでもかれることのない潜在意識の井戸を、行政改革によって村が変わっても、井戸は変わらない。そのことがこの卦の持つ意味です。「良いことを思えば良いことを思えば良い」という法則とは「良いことを思えば良いことにあふれてくる」ということです。いくら潜在意識の法則とは「良いことを思えば良い」ということです。「良いことを汲めばいくらでも汲める」ということです。つまり井戸は潜在意識の井戸で、メカニズムが0と1から成り立っているように、宇宙の法則もこんな単純な記号でできあがっているのでわかることがないのです。'],
  [49,'沢火革','たくかかく',['変革','変革','変革'],[0,1,1,1,0,1],'革、己日乃孚、元亨利貞、悔亡。時が満ちた時の根本的な変革。','変革の時。古いものを捨て、新しいものを受け入れよ。','「革は、己日にして乃ち孚られる」この「易経」の意味は「革命や革新」という動機は正しく「悔いなくなりて元いに亨り貞しきに利ろし」とあります。いまは良くも悪くも変化の時です。好むと好まざるとにかわらず現状は変化します。いやそうするべきです。「易経」の大きな変革すべき問題はないか。あたりを見回して自分おおよびり自分の環境の一大変革をすれば「現状に限界がある」ということを示しています。これは別の見方をすれば、周囲の保守的な考えに引きずられていないか。習慣の名において、伝統の名においてできていないか。改革しなければならないとは思えないか。勇気がないのではないか。周囲を変えるためにはまず自分が変わらなくてはいけない。いやそうでなければ、いまは変革の時であるということがわかりましょう。要するに改めることはできますが、これが社会的なことばかりでなく個人の自己変革、大いなる決意を改めよ—というのが改めることがすすめられています。'],
  [50,'火風鼎','かふうてい',['大きな鍋','大きな鍋','大きな鍋'],[1,0,1,0,1,0],'鼎、元吉、亨。古いものを煮直し、新たな価値を創る。','変容と精錬の時。古い材料から新しい価値を創れ。','鼎（てい）は三本足の金属性の鍋のことで、非常に安定した中で炊きごとをする人間生活にとって重要な道具です。安定した中で何をやっても確実に成功することができる。いまあなたはすべての機能を発揮できるところです。それはあなたに吉の方向にとどのです。一つの鍋に三本の足でなりたっていて、堂々と事に臨んで安定を得ていよい。ただ鼎の特質、その安定性の根拠は単に鼎であればよいのです。あなたはすべての事に確実に成功しています。まず食材を集めて、鍋に入れて火をおこす。誰かが手分けして料理をつくることを思い浮かべれば、これは非常に楽しいことができます。皿にとってみんなで食べる。そういう食の楽しさは勤労と空腹に一体感が生まれてくる。それが成功者に共通する資質であることが大切です。そして、それはこの卦が出たときは山小屋で鍋を囲むように充実したひとときを他人のために、そして同時にこれがあなたの人生を大きく飛躍させるのです。マーフィー博士はツキを呼ぶテクニックとして次のようにトレーニングしなさいといいます。'],
  [51,'震為雷','しんいらい',['奮起させるもの','奮起させるもの','奮起させるもの'],[1,0,0,1,0,0],'震、亨。震来虩虩、笑言哑哑。雷鳴が警醒させ、新たな気づきをもたらす。','突然の衝撃が目を覚まさせる。恐れず受け入れよ。','震（しん）は第三章で「震、地震、奮起、活発地という言葉を示すものです」。それが発展、大飛躍としてやっている状態を暗示しています。二つ重なったのがこの卦で、まさにそれがこの卦として出たとき、発展、活発地という可能性があります。シンボルの一つで、驚天動地という言葉があるが、その状態を暗示しているのです。一点集中のエネルギーを発揮することで、思いもかけない大成果を得ることができます。リのすごさは、人間にとっても雷にやられるとおどかされたとしても、それはあなたにとって発展のためのエネルギーを一点に集中できるから固いものでも穴をあけることができるのです。たとえばキリの先のすごさは、雷の怖さです。むしろあなた自身が奮起してやってくるというのは、周囲の情況が良くて一気に盛運になる。加えられたエネルギーのすごさは、その欲望の表現—「欲望の表現だ」と雷をとどろかして事に当たることでよいのですが、それが自分だけの力に錯覚して、その力に頼りすぎてしまうのです。'],
  [52,'艮為山','ごんいさん',['山、静止した状態','山、静止した状態','山、静止した状態'],[0,0,1,0,0,1],'艮其背、不獲其身。行其庭、不見其人。静止の中に真の平和がある。','動きを止め、内面を見つめよ。静けさの中に答えがある。','艮（ごん）は「とどまって動かない」の意味。この卦はどんな活動家でも一日に一回は眠る。眠ることは絶対に欠かせません。より積極的に行動するためにも必要なことです。「あなたの山のごとし」がよいということは、活動するためにも静めることを暗示しています。いまは積極的ではなく、より積極的に行動することは絶対に必要なことです。なぜ静かにしているのですか。マーフィー博士はこういっています「動かざること山のごとし」静止して考えればわかることです。これが山のごとく静止することが最良です。あなたの心を静めるということが必要なことです。現在自身の理性や感情が見えやすくなってきます。好ましい未来というのは、想像力を発揮することです。あなたは心細密に細心の注意で可能な限り細密な自分の未来を想像することには現実のものとなっています。このことがいかに大切かは、あなたがじっと静止して考えることができることがあります。これは潜在意識の働きが現実のものとなっているのです。'],
  [53,'風山漸','ふうさんぜん',['現在進行形で語れ','現在進行形で語れ','現在進行形で語れ'],[0,1,0,0,0,1],'漸、女歸吉、利貞。鳥が木々を渡るように、段階的に進む。','急がず、段階を踏め。着実な前進が長続きする。','潜在意識活用の原則の一つに「現在進行形で語れ」ということがあります。これはたとえば「自分は今金持ちである」とする肯定的な思考でも「自分は金持ちになれる」という、いまあなたが経済的に急迫しているとしたら「経済的に豊かになれる」という否定思考を解決するのは難しいことです。現実という名の経済的に問題として「否定思考を解決するために「自分は今金持ちである」という肯定定思考ではありません。否定思考をやめて「自分はいまどんどん金持ちになっていく」「現在進行形」とします。この卦は潜在意識を活用する原則の一つ「現在進行形で語れ」と心の底から思うことができますか。どうがんばっても計画や希望や計画を諦めてしまいます。絶対に諦めない、否定的にならずに潜在意識を機能させるには、この方法が最大のことなのです。問題はそこにあります。境遇を最終的には変化させてくれるのです。どんな境遇であっても、どんな境遇に置かれていても、自分の夢や希望や計画を否定的にもならずに絶対に諦めないことです。同時に、これから未来永遠にそうである保証はどこにもない。'],
  [54,'雷沢帰妹','らいたくきまい',['通じている女','通じている女','通じている女'],[1,0,0,0,1,1],'帰妹、征凶、无攸利。従属的な立場での行動には慎重に。','関係の中での自分の立場を弁えよ。無理な要求は慎め。','帰（き）は「とつぐ」の意で、妹（まい）は「少女」。この卦の本文は「夫に内縁として姦通している女」と解釈すると、実際に自分の妻が他の男にとっての「夫に内縁として姦通しているいさか通用しない存在であることを「通じている女」としました。これはもちろん象徴的な意味を含んでおり、未熟な者が一人前の社会的行動、肉体的経験をすることの災難を意味しています。むろんこれは象徴的なことです。この卦は自分に罪はないのに、どうも災難がふりかかる、行動は慎重に、また、日常生活のペースはさかと思えど、メンタルシグナルによく耳を傾けるべきです。変化は、理性や論理的推論では絶対に測定できないものだからです。あなたの理性はもっとも重大なウェイトが大きい。しかし実はこれは判断の最終決定を下しているのが理性と思っていながら、プロセスで「さわめた意識で判断をしているのです。そのため何かと災難がふりかかりやすくなっています。理性で判断するよりも、潜在意識の声に耳を傾けるべきです。変化は理性的推論では절対に測定できないものだからです。'],
  [55,'雷火豊','らいかほう',['実り多きこと、豊富なありさ','実り多きこと、豊富なありさ','実り多きこと'],[1,0,0,1,0,1],'豊、亨、王假之、勿憂、宜日中。最高潮の豊かさ。しかし永続しない。','絶頂の時。今を楽しめ。しかし変化に備えよ。','豊（ほう）は「実り多きこと」と「盛大なありさ」という意味で、これはきわめて順調な吉の卦です。問題はまず、豊かな人は豊かさを常態と考えています。貧しい人が欠乏感を常態と考えているように。貧しい人は貧しさを常態と考えていますから、潜在意識のうちに欠乏の観念を抱くものです。「欠乏意識」を一掃しないかぎり豊かになれないのです。マーフィー博士はこういっています「まず、あなたがいまどんな状態にあれ、すべての状態を肯定してしまいなさい。富を自分に引き寄せる方法はこれしかない。そうすれば、あなたが頭の中を豊富の観念で満たしてしまいなさい」。本当に豊かな人は豊かさを感じ、豊かなことの第一歩で、周囲の人も豊かにしています。つまり豊かな人が逆に豊かさを感じるのは当然のことです。しかし人間の欲望は限りがない、そこで次の計画や目標を立てて、それを実行することには関係なく、すべての状態にもっとも大きなことも小さくても悪いことも大切にして良いことを確信しなさい。'],
  [56,'火山旅','かさんりょ',['さまよう人','さまよう人','さまよう人'],[1,0,1,0,0,1],'旅、小亨、旅貞吉。旅人として慎重に、礼儀正しく。','旅と変化の時。身軽に、柔軟に、礼を忘れるな。','この卦の一般的解釈は旅をキーワードに居所定まらず不安定、また人との親しみの情も薄い、じゅうぶん気をつけて「さまよう人」としました。不安定、また人との信念も確信もなく、毎日を自信なく、また不安や問題をかかえ、どうしたらいいのかと迷っている人。そこでマーフィー博士はこれを「さまよう人」としています。これはたとえば大望を抱くな、人との関係も薄くなります。信念とは心構えです。信念とは心の平和が欠いた状態を暗示しているのです。いまあなたにいちばん必要なのは信念です。信念を持たない人には、信念がない人の過去の解釈と理解してはいけない。未来予測には、あまり役に立ちません。未来に自信を持てる人、たとえば「自分には無限の能力があるのですぐに止めるべきです。そのためにすべきことは「自分には無限の能力をもって潜在意識が備わっており、それはいつでも自分の目的地に進んでいる」と確信することです。あなたがさまよう人でないならば機能するということが大切です。'],

// 卦番号→データ検索
function getHexByNum(n) { return HEXAGRAMS[n-1]; }

// ============================
// 第一分卧法（大衍の数）シミュレーション
// ============================
function yarrowDivination() {
  // 50本から1本抜いて49本を使う
  // 三変で一爻を得る
  // 返値: 6=老陰(変), 7=少陽, 8=少陰, 9=老陽(変)
  function oneChange() {
    let sticks = 49;
    let val = 0;
    for (let i = 0; i < 3; i++) {
      // ランダムに二分割
      let left = Math.floor(Math.random() * (sticks - 1)) + 1;
      let right = sticks - left;
      // 右から1本取り出す
      right -= 1;
      // 左を4本ずつ数える
      let lRem = left % 4 || 4;
      let rRem = right % 4 || 4;
      let aside = 1 + lRem + rRem; // 脇に置く本数
      sticks -= aside;
      val += aside <= 5 ? 3 : 2; // 5本以下なら3、9本なら2
    }
    return val; // 6,7,8,9のいずれか
  }

  // 6爻分（下から）
  const lines = [];
  for (let i = 0; i < 6; i++) {
    lines.push(oneChange());
  }
  return lines;
}

// ============================
// 卦の同定
// ============================
function linesToHexNum(lines) {
  // lines: 配列[6] 下から。6=陰変,7=陽,8=陰,9=陽変
  // 各爻の陰陽: 6,8→陰(0) 7,9→陽(1)
  const binary = lines.map(l => (l === 7 || l === 9) ? 1 : 0);
  // 上卦(爻4-6)・下卦(爻1-3)
  const lower = binary.slice(0, 3);
  const upper = binary.slice(3, 6);
  // 八卦コード→番号
  function triToIdx(tri) {
    return tri[2]*4 + tri[1]*2 + tri[0]; // 下から
  }
  // キング・ウェン配列で卦番号を特定
  // 簡易マッピング（上卦×8+下卦）
  const table = [
    [1,34,5,26,11,9,14,43],
    [25,51,3,27,24,42,21,17],
    [6,40,29,4,7,59,64,47],
    [33,62,39,52,15,53,56,31],
    [12,16,8,23,2,20,35,45],
    [44,32,48,18,46,57,50,28],
    [13,55,63,22,36,37,30,49],
    [10,54,60,41,19,61,38,58]
  ];
  const ui = triToIdx(upper);
  const li = triToIdx(lower);
  return table[ui][li];
}

function getZhiGua(lines) {
  // 変爻を反転して之卦を得る
  const changed = lines.map(l => {
    if (l === 9) return 8; // 老陽→陰
    if (l === 6) return 7; // 老陰→陽
    return l;
  });
  return linesToHexNum(changed);
}

// ============================
// SVG卦画
// ============================
function renderHexLines(lines, size='normal') {
  const w = size === 'small' ? 60 : 80;
  const lineH = size === 'small' ? 4 : 6;
  const gap = size === 'small' ? 5 : 8;
  // 陰爻：左右セグメントを w の43%、中央空白を14%に固定
  const segW = Math.floor(w * 0.43);
  const gapW = w - segW * 2;

  let html = `<div style="display:flex;flex-direction:column-reverse;gap:${gap}px;">`;
  for (let i = 0; i < 6; i++) {
    const v = lines[i];
    const isYang = (v===7||v===9);
    const isChange = (v===6||v===9);
    const color = isChange ? '#8b2020' : '#1a1208';

    // 全爻を同じw幅・同じlineH高さのコンテナに収める
    html += `<div style="width:${w}px;height:${lineH}px;position:relative;">`;
    if (isYang) {
      // 陽爻：幅w全体を塗りつぶす
      html += `<div style="position:absolute;inset:0;background:${color};border-radius:1px;"></div>`;
      if (isChange) {
        const r = lineH + 2;
        html += `<div style="position:absolute;width:${r*2}px;height:${r*2}px;border:1.5px solid #8b2020;border-radius:50%;background:var(--paper);top:50%;left:50%;transform:translate(-50%,-50%);"></div>`;
      }
    } else {
      // 陰爻：左セグメント
      html += `<div style="position:absolute;left:0;top:0;width:${segW}px;height:${lineH}px;background:${color};border-radius:1px;"></div>`;
      // 陰爻：右セグメント
      html += `<div style="position:absolute;right:0;top:0;width:${segW}px;height:${lineH}px;background:${color};border-radius:1px;"></div>`;
      if (isChange) {
        html += `<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:${lineH+3}px;color:#8b2020;line-height:1;font-weight:bold;">×</div>`;
      }
    }
    html += `</div>`;
  }
  html += '</div>';
  return html;
}

function renderStaticHex(num, size='normal') {
  const h = HEXAGRAMS[num-1];
  const lines = h[4].map(v => v ? 7 : 8);
  return renderHexLines(lines, size);
}

// ============================
// 占い実行
// ============================
let currentSession = null;

async function startDivination() {
  const question = document.getElementById('question-text').value.trim();
  if (!question) {
    alert('問いを入力してください。');
    return;
  }

  const btn = document.getElementById('btn-divine');
  btn.disabled = true;

  // 筮竹パネル表示
  const yarrowPanel = document.getElementById('yarrow-panel');
  yarrowPanel.style.display = 'block';
  initYarrowViz();

  // アニメーションで6爻を順番に求める
  const lines = [];
  for (let i = 0; i < 6; i++) {
    document.getElementById('div-progress').textContent = `第${['一','二','三','四','五','六'][i]}爻を求めています…`;
    animateYarrow();
    await sleep(900);
    const v = [6,7,8,9][Math.floor(Math.random()*4)]; // 本来はyarrowDivination()の一爻分
    lines.push(v);
  }

  // 実際の第一分卧法で計算
  const realLines = yarrowDivination();
  lines.splice(0, 6, ...realLines);

  document.getElementById('div-progress').textContent = '卦象が定まりました';
  await sleep(500);
  yarrowPanel.style.display = 'none';

  // 卦の同定
  const honKuaNum = linesToHexNum(lines);
  const honKua = HEXAGRAMS[honKuaNum-1];
  const changingLines = lines.map((v,i) => (v===6||v===9) ? i+1 : null).filter(Boolean);
  const hasChange = changingLines.length > 0;
  const zhiKuaNum = hasChange ? getZhiGua(lines) : null;
  const zhiKua = zhiKuaNum ? HEXAGRAMS[zhiKuaNum-1] : null;

  // セッション保存
  currentSession = { question, lines, honKuaNum, zhiKuaNum, changingLines, date: new Date() };

  // 結果表示
  displayResult(honKua, zhiKua, lines, changingLines);

  // Claude API呼び出し
  await callClaudeAPI(question, honKua, zhiKua, changingLines);

  // 記録保存
  saveRecord(currentSession, document.getElementById('ai-text').textContent);

  btn.disabled = false;
}

function displayResult(honKua, zhiKua, lines, changingLines) {
  const el = document.getElementById('hexagram-result');

  let html = `<div class="hexagram-display">`;

  if (zhiKua) {
    html += `<div class="hex-pair">`;
    html += `<div class="hex-card">
      <div class="label">本 卦</div>
      ${renderHexLines(lines)}
      <div class="hex-name">${honKua[1]}</div>
      <div class="hex-number">第${honKua[0]}卦</div>
    </div>`;
    const zhiLines = lines.map(l => (l===9?8:(l===6?7:l)));
    html += `<div style="display:flex;align-items:center;font-size:1.5rem;color:var(--gold);opacity:0.5;">→</div>`;
    html += `<div class="hex-card">
      <div class="label">之 卦</div>
      ${renderHexLines(zhiLines)}
      <div class="hex-name">${zhiKua[1]}</div>
      <div class="hex-number">第${zhiKua[0]}卦</div>
    </div>`;
    html += `</div>`;
    html += `<div style="font-size:0.8rem;color:var(--vermillion);letter-spacing:0.2em;">変爻：第${changingLines.join('・')}爻</div>`;
  } else {
    html += `<div class="hex-card">
      <div class="label">本 卦</div>
      ${renderHexLines(lines)}
      <div class="hex-name">${honKua[1]}</div>
      <div class="hex-number">第${honKua[0]}卦</div>
    </div>`;
  }

  html += `</div>`;
  el.innerHTML = html;

  document.getElementById('ai-result-area').style.display = 'block';
  document.getElementById('ai-text').textContent = '';
  document.getElementById('ai-text').classList.add('typing-cursor');
}

// ============================
// Claude API連携
// ============================
async function callClaudeAPI(question, honKua, zhiKua, changingLines) {
  const aiText = document.getElementById('ai-text');
  aiText.textContent = '解釈を紡いでいます…';

  const zhiStr = zhiKua ? `\n之卦：第${zhiKua[0]}卦「${zhiKua[1]}」（${zhiKua[2]}）\n変爻：第${changingLines.join('・')}爻` : '';

  const prompt = `あなたは易経の達人です。以下の占い結果について、周易原典とDr. Josephマーフィーのイーチン解釈の両方を踏まえた、深みのある現代語解釈を300字以内で提示してください。

【問い】${question}

【卦象】
本卦：第${honKua[0]}卦「${honKua[1]}」（${honKua[2]}）
キーワード：${honKua[3].join('・')}
周易卦辞：${honKua[5]}
Murphy解釈：${honKua[6]}${zhiStr}

解釈は「問いに対する天の示唆」として、具体的で実践的な内容にしてください。`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content?.map(c => c.text || '').join('') || '（解釈を取得できませんでした）';

    // タイピングアニメーション
    aiText.classList.remove('typing-cursor');
    aiText.textContent = '';
    for (let i = 0; i < text.length; i++) {
      aiText.textContent += text[i];
      if (i % 3 === 0) await sleep(20);
    }
  } catch (e) {
    aiText.classList.remove('typing-cursor');
    aiText.textContent = `周易の示唆：「${honKua[1]}」は${honKua[6]}（API未接続のため、組み込み解釈を表示しています）`;
  }
}

// ============================
// 八卦データ（上卦・下卦）
// ============================
// 伝統的な順序：乾・兌・離・震・巽・坎・艮・坤
const EIGHT_TRIGRAMS = [
  { name:'乾', symbol:'☰', lines:[1,1,1] }, // 下=陽 中=陽 上=陽
  { name:'兌', symbol:'☱', lines:[1,1,0] }, // 下=陽 中=陽 上=陰
  { name:'離', symbol:'☲', lines:[1,0,1] }, // 下=陽 中=陰 上=陽
  { name:'震', symbol:'☳', lines:[1,0,0] }, // 下=陽 中=陰 上=陰
  { name:'巽', symbol:'☴', lines:[0,1,1] }, // 下=陰 中=陽 上=陽
  { name:'坎', symbol:'☵', lines:[0,1,0] }, // 下=陰 中=陽 上=陰
  { name:'艮', symbol:'☶', lines:[0,0,1] }, // 下=陰 中=陰 上=陽
  { name:'坤', symbol:'☷', lines:[0,0,0] }, // 下=陰 中=陰 上=陰
];

// 上卦(列)×下卦(行)の卦番号テーブル
// 行=下卦(乾兌離震巽坎艮坤)、列=上卦(乾兌離震巽坎艮坤)
const MATRIX_TABLE = [
  // 乾  兌  離  震  巽  坎  艮  坤  ← 上卦
  [  1, 43, 14, 34,  9,  5, 26, 11], // 下卦:乾
  [ 10, 58, 38, 54, 61, 60, 41, 19], // 下卦:兌
  [ 13, 49, 30, 55, 37, 63, 22, 36], // 下卦:離
  [ 25, 17, 21, 51, 42,  3, 27, 24], // 下卦:震
  [ 44, 28, 50, 32, 57, 48, 18, 46], // 下卦:巽
  [  6, 47, 64, 40, 59, 29,  4,  7], // 下卦:坎
  [ 33, 31, 56, 62, 53, 39, 52, 15], // 下卦:艮
  [ 12, 45, 35, 16, 20,  8, 23,  2], // 下卦:坤
];

// 八卦の爻パターン（下→上の順）
function trigramLines(tri) {
  return tri.lines; // [下爻, 中爻, 上爻]
}

// セル内の小卦象HTML（6爻：下から上へ表示）
function miniHex(upperTri, lowerTri) {
  // 6爻 = 下卦の3爻 + 上卦の3爻（下から）
  const allLines = [...lowerTri.lines, ...upperTri.lines];
  let html = '<div class="hex-mini">';
  for (let i = 0; i < 6; i++) {
    const isYang = allLines[i] === 1;
    html += '<div class="hex-mini-row">';
    if (isYang) {
      html += '<div class="hex-mini-line yang"></div>';
    } else {
      html += '<div class="hex-mini-line yin"></div><div style="width:4px;"></div><div class="hex-mini-line yin"></div>';
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

// 三爻の小卦象HTML（ヘッダー・左列用）
function miniTrigram(tri) {
  let html = '<div class="hex-mini">';
  for (let i = 0; i < 3; i++) {
    const isYang = tri.lines[i] === 1;
    html += '<div class="hex-mini-row">';
    if (isYang) {
      html += '<div class="hex-mini-line yang"></div>';
    } else {
      html += '<div class="hex-mini-line yin"></div><div style="width:4px;"></div><div class="hex-mini-line yin"></div>';
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

// ============================
// 64卦マトリックス（本格版）
// ============================
function buildMatrix() {
  const grid = document.getElementById('matrix-grid');
  grid.innerHTML = '';

  // コーナーセル
  const corner = document.createElement('div');
  corner.className = 'matrix-corner';
  corner.innerHTML = '上卦→<br>下卦↓';
  grid.appendChild(corner);

  // ヘッダー行（上卦 × 8）
  EIGHT_TRIGRAMS.forEach(upper => {
    const cell = document.createElement('div');
    cell.className = 'matrix-header-cell';
    cell.innerHTML = `
      <div class="trigram-name">${upper.name}</div>
      ${miniTrigram(upper)}
    `;
    grid.appendChild(cell);
  });

  // 8行（下卦ごと）
  EIGHT_TRIGRAMS.forEach((lower, ri) => {
    // 左列（下卦）
    const rowCell = document.createElement('div');
    rowCell.className = 'matrix-row-cell';
    rowCell.innerHTML = `
      <div class="trigram-name">${lower.name}</div>
      ${miniTrigram(lower)}
    `;
    grid.appendChild(rowCell);

    // 8列（上卦ごと）
    EIGHT_TRIGRAMS.forEach((upper, ci) => {
      const num = MATRIX_TABLE[ri][ci];
      const h = HEXAGRAMS[num - 1];
      const cell = document.createElement('div');
      cell.className = 'matrix-cell';
      cell.innerHTML = `
        <div class="cell-num">${num}</div>
        ${miniHex(upper, lower)}
        <div class="cell-name">${h[1]}</div>
      `;
      cell.onclick = () => showHexDetail(num);
      grid.appendChild(cell);
    });
  });
}

function showHexDetail(num) {
  const h = HEXAGRAMS[num-1];
  document.getElementById('modal-lines').innerHTML = renderStaticHex(num);

  document.getElementById('modal-info').innerHTML = `
    <h2>${h[1]}</h2>
    <div class="reading">${h[2]}</div>
    <div>${h[3].map(k=>`<span class="keyword">${k}</span>`).join('')}</div>
  `;

  document.getElementById('modal-sections').innerHTML = `
    <div class="modal-section">
      <h3>◈ 周易・卦辞（原典）</h3>
      <p>${h[5]}</p>
    </div>
    <div class="modal-section">
      <h3>◈ Dr. Murphy 大意</h3>
      <p>${h[6]}</p>
    </div>
    ${h[7] ? `<div class="modal-section">
      <h3>◈ Dr. Murphy 詳細解説</h3>
      <p>${h[7]}</p>
    </div>` : ''}
  `;

  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modal').classList.remove('open');
}

// ============================
// 記録
// ============================
function saveRecord(session, interpretation) {
  const records = JSON.parse(localStorage.getItem('iching_records') || '[]');
  const h = HEXAGRAMS[session.honKuaNum-1];
  records.unshift({
    date: session.date.toISOString(),
    question: session.question,
    hexNum: session.honKuaNum,
    hexName: h[1],
    zhiNum: session.zhiKuaNum,
    changingLines: session.changingLines,
    interpretation: interpretation.slice(0, 200)
  });
  localStorage.setItem('iching_records', JSON.stringify(records.slice(0, 50)));
  renderRecords();
}

function renderRecords() {
  const el = document.getElementById('record-list');
  const records = JSON.parse(localStorage.getItem('iching_records') || '[]');

  if (records.length === 0) {
    el.innerHTML = '<div class="empty-state">まだ記録がありません</div>';
    return;
  }

  el.innerHTML = records.map(r => {
    const d = new Date(r.date);
    const ds = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
    const zhiStr = r.zhiNum ? ` → 第${r.zhiNum}卦「${HEXAGRAMS[r.zhiNum-1][1]}」` : '';
    return `<div class="record-item">
      <div class="date">${ds}</div>
      <div class="hex-name-row">第${r.hexNum}卦「${r.hexName}」${zhiStr}</div>
      <div class="text-preview">問：${r.question}<br>${r.interpretation}…</div>
    </div>`;
  }).join('');
}

// ============================
// ナビゲーション
// ============================
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// 初期化
buildMatrix();
renderRecords();
</script>
